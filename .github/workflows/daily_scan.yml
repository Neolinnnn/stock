name: 台股每日掃描

on:
  schedule:
    # 14:32 台灣時間 = 06:32 UTC，週一至週五
    - cron: '32 6 * * 1-5'
    # 週報：週五 14:47 = 06:47 UTC
    - cron: '47 6 * * 5'
  workflow_dispatch:   # 允許手動觸發

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python strategy_templates/07_daily_scan.py

      - name: Run weekly summary (Fridays only)
        if: github.event.schedule == '47 6 * * 5'
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python strategy_templates/08_weekly_summary.py

      - name: Commit reports
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://Neolinnnn:${GH_TOKEN}@github.com/Neolinnnn/stock.git
          git add daily_reports/
          git diff --cached --quiet || git commit -m "auto: 每日掃描 $(date '+%Y-%m-%d')"
          git push

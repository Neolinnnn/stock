name: 台股每日掃描

on:
  schedule:
    # 15:30 台灣時間 = 07:30 UTC，週一至週五
    # （15:00 後 FinMind 三大法人籌碼資料才齊全；GitHub Actions cron 常延遲 1-4 小時）
    - cron: '30 7 * * 1-5'
    # 週報：週五 15:45 = 07:45 UTC
    - cron: '45 7 * * 5'
  workflow_dispatch:   # 允許手動觸發

# 防止同日多次 run 並發衝突：同一 group 的舊 run 會被取消
concurrency:
  group: daily-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: price_cache
          key: price-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            price-cache-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # ta==0.5.25 (FinMind dep) fails to build with setuptools>=68
          pip install "setuptools<68" -q
          pip install -r requirements.txt
          # macro 模組額外依賴（多代理分析的國際指標／重訊解析）
          pip install -r macro/requirements.txt

      - name: Run daily scan
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/daily_scan.py

      - name: Fetch fundamentals
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
        run: python scripts/fundamentals_fetcher.py

      - name: Enrich product mix (qualified stocks)
        # 緊接 daily_scan + fundamentals 後，搶在週報／多代理敘述前用 Gemini 配額，
        # 確保行動清單產銷組合在同一天就能顯示
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: |
          python scripts/enrich_product_mix.py --qualified
          # 補齊尚無產銷組合的個股（每次最多 20 支，加速清完待補清單）
          python scripts/enrich_product_mix.py --missing --limit 20
          # 把剛抓的產銷組合帶進當日 payload（行動清單按鈕）
          python scripts/rebuild_daily_payload.py

      - name: Breakout scan (second signal source)
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
        run: python scripts/breakout_scan.py

      - name: Whale scan (大戶籌碼，TDCC 每週六更新)
        # TDCC 只提供最新一週 → 每日執行累積歷史；同週重跑只是覆蓋同筆資料
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
        run: python scripts/whale_scan.py --backfill

      - name: Run analyzer framework daily scan
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/analyzer_daily.py

      - name: Run weekly summary (Fridays only)
        if: github.event.schedule == '45 7 * * 5'
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/weekly_summary.py

      - name: Run sector rotation backtest (Fridays only)
        if: github.event.schedule == '45 7 * * 5'
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
        run: python scripts/sector_rotation_backtest.py

      - name: Build multi-agent analysis (agents)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
        run: |
          # 即時 regime（國際指標 + 川普/總經 grounding）+ Gemini 敘述；失敗自動降級
          python agents/pipeline.py --macro --gemini || python agents/pipeline.py
          # 產生靜態頁 docs/agents/index.html（每日覆寫為最新）
          python agents/build_preview.py --docs

      - name: Audit static content (健檢報告)
        continue-on-error: true
        run: python scripts/audit_docs.py

      - name: Coverage report (資料覆蓋率表)
        continue-on-error: true
        run: python scripts/coverage_report.py

      - name: Commit reports
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add daily_reports/ docs/
          # 強制重新產生 dates.json（從 docs/ 現有 JSON 掃描），確保即使 build_docs
          # 中途失敗也不會漏掉新日期
          python3 -c "
          from pathlib import Path; import json
          dates = sorted([f.stem for f in Path('docs').glob('[0-9]*.json') if len(f.stem)==8], reverse=True)
          Path('docs/dates.json').write_text(json.dumps(dates, ensure_ascii=False))
          print(f'dates.json 已更新：{len(dates)} 個日期，最新={dates[0] if dates else \"無\"}')
          "
          git add docs/dates.json
          if git diff --cached --quiet; then
            echo "無新增內容"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "auto: 每日掃描 $(TZ='Asia/Taipei' date '+%Y-%m-%d')"
          # 最多重試 3 次 push（防止並發 reject）
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && break
            echo "Push 失敗，第 ${i} 次重試..."
            sleep $((i * 5))
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        # bot commit 用 GITHUB_TOKEN push，不會自動觸發 deploy_pages.yml 的 push 事件
        # （GitHub 防遞迴機制），須顯式呼叫 workflow_dispatch API 才會真的部署
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy_pages.yml --ref main

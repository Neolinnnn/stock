name: 台股每日掃描

on:
  schedule:
    # 14:32 台灣時間 = 06:32 UTC，週一至週五
    - cron: '32 6 * * 1-5'
    # 週報：週五 14:47 = 06:47 UTC
    - cron: '47 6 * * 5'
  workflow_dispatch:   # 允許手動觸發

# 防止同日多次 run 並發衝突：同一 group 的舊 run 會被取消
concurrency:
  group: daily-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # ta==0.5.25 (FinMind dep) fails to build with setuptools>=68
          pip install "setuptools<68" -q
          pip install -r requirements.txt

      - name: Run daily scan
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/daily_scan.py

      - name: Run weekly summary (Fridays only)
        if: github.event.schedule == '47 6 * * 5'
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/weekly_summary.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TODAY=$(TZ='Asia/Taipei' date '+%Y%m%d')
          # 若今天的報告已在 remote，直接跳過（避免重複 run 造成衝突）
          git fetch origin main
          if git ls-tree -d origin/main -- "daily_reports/${TODAY}" | grep -q "${TODAY}"; then
            echo "今日報告已在 remote，略過 commit/push"
            exit 0
          fi
          git add daily_reports/ docs/
          git diff --cached --quiet && echo "無新增內容" && exit 0
          git commit -m "auto: 每日掃描 $(TZ='Asia/Taipei' date '+%Y-%m-%d')"
          # 最多重試 3 次 push（防止並發 reject）
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push 失敗，第 ${i} 次重試..."
            sleep $((i * 5))
          done

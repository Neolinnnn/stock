name: 台股每日掃描

on:
  schedule:
    # 14:32 台灣時間 = 06:32 UTC，週一至週五
    - cron: '32 6 * * 1-5'
    # 週報：週五 14:47 = 06:47 UTC
    - cron: '47 6 * * 5'
  workflow_dispatch:   # 允許手動觸發

# 防止同日多次 run 並發衝突：同一 group 的舊 run 會被取消
concurrency:
  group: daily-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # ta==0.5.25 (FinMind dep) fails to build with setuptools>=68
          pip install "setuptools<68" -q
          pip install -r requirements.txt

      - name: Run daily scan
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/daily_scan.py

      - name: Run weekly summary (Fridays only)
        if: github.event.schedule == '47 6 * * 5'
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/weekly_summary.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_reports/ docs/
          git diff --cached --quiet || git commit -m "auto: 每日掃描 $(TZ='Asia/Taipei' date '+%Y-%m-%d')"
          # pull --rebase 防止其他 push 在掃描期間搶先導致 reject
          git pull --rebase origin main
          git push

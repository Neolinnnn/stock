name: 台股每日掃描

on:
  schedule:
    # 15:30 台灣時間 = 07:30 UTC，週一至週五
    # （15:00 後 FinMind 三大法人籌碼資料才齊全；GitHub Actions cron 常延遲 1-4 小時）
    - cron: '30 7 * * 1-5'
    # 週報：週五 15:45 = 07:45 UTC
    - cron: '45 7 * * 5'
  workflow_dispatch:   # 允許手動觸發

# 防止同日多次 run 並發衝突：同一 group 的舊 run 會被取消
concurrency:
  group: daily-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # ta==0.5.25 (FinMind dep) fails to build with setuptools>=68
          pip install "setuptools<68" -q
          pip install -r requirements.txt

      - name: Run daily scan
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/daily_scan.py

      - name: Run weekly summary (Fridays only)
        if: github.event.schedule == '45 7 * * 5'
        continue-on-error: true
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/weekly_summary.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add daily_reports/ docs/
          # 只有當「沒有任何檔案要 commit」時才略過；不要因為 daily_reports/TODAY
          # 已在 remote 就跳過——這樣會漏掉 docs/dates.json 等補寫變更
          git diff --cached --quiet && echo "無新增內容" && exit 0
          git commit -m "auto: 每日掃描 $(TZ='Asia/Taipei' date '+%Y-%m-%d')"
          # 最多重試 3 次 push（防止並發 reject）
          # -X ours：rebase 衝突時優先保留本次掃描產出的資料
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && break
            echo "Push 失敗，第 ${i} 次重試..."
            sleep $((i * 5))
          done

name: 單檔基本面功課

on:
  workflow_dispatch:
    inputs:
      stock_id:
        description: '股票代碼（例 4958）'
        required: true
        type: string

# 同一檔重複觸發時取消舊 run，避免互撞
concurrency:
  group: homework-one-${{ github.event.inputs.stock_id }}
  cancel-in-progress: true

jobs:
  homework-one:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: price_cache
          key: price-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            price-cache-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # ta==0.5.25 (FinMind dep) fails to build with setuptools>=68
          pip install "setuptools<68" -q
          pip install -r requirements.txt

      - name: Generate homework
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: python scripts/fundamental_homework.py "${{ github.event.inputs.stock_id }}" --force

      - name: Commit result
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add docs/homework/
          if git diff --cached --quiet; then
            echo "無新增內容"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "auto: 基本面功課 ${{ github.event.inputs.stock_id }}"
          # 最多重試 3 次 push（防止與每日掃描並發 reject）
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && break
            echo "Push 失敗，第 ${i} 次重試..."
            sleep $((i * 5))
          done
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        # bot commit 用 GITHUB_TOKEN push，不會自動觸發 deploy_pages.yml 的 push 事件
        # （GitHub 防遞迴機制），須顯式呼叫 workflow_dispatch API 才會真的部署
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy_pages.yml --ref main

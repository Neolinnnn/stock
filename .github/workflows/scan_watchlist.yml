name: 自選清單掃描

on:
  workflow_dispatch:
    inputs:
      stocks:
        description: '股票代碼（逗號分隔，如 2330,2317,6669）'
        required: true
        type: string

concurrency:
  group: scan-watchlist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: price_cache
          key: price-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: price-cache-${{ runner.os }}-
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install "setuptools<68" -q
          pip install -r requirements.txt
      - name: Run watchlist scan
        env:
          SCAN_STOCKS: ${{ inputs.stocks }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          FINMIND_TOKEN_1: ${{ secrets.FINMIND_TOKEN_1 }}
        run: python scripts/scan_watchlist.py
      - name: Commit scan data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_reports/ docs/
          git diff --cached --quiet && echo "無新增內容" && exit 0
          git commit -m "auto: 自選清單掃描 $(TZ='Asia/Taipei' date '+%Y-%m-%d')"
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && break
            echo "Push 失敗，第 ${i} 次重試..."
            sleep $((i * 5))
          done

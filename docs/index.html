<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台股族群掃描</title>
<style>
  :root {
    --bg:#0e1117; --card:#1a1d24; --border:#2d3139;
    --text:#e0e0e0; --sub:#888; --green:#27ae60;
    --red:#e74c3c; --yellow:#f39c12; --blue:#3498db;
    --accent:#1f77b4;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:14px;}

  header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  header h1{font-size:17px;font-weight:700;}
  nav{display:flex;gap:4px;}
  nav a{color:var(--sub);text-decoration:none;padding:5px 13px;border-radius:6px;font-size:13px;cursor:pointer;transition:.15s;}
  nav a.active,nav a:hover{background:var(--accent);color:#fff;}

  .date-picker{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .date-picker label{font-size:12px;color:var(--sub);}
  .date-picker select{background:#13161d;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;}
  .date-nav{background:#1e2330;border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 9px;cursor:pointer;font-size:12px;}
  .date-nav:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  main{padding:20px 24px;max-width:1400px;margin:0 auto;}

  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  @media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}}
  @media(max-width:480px){.grid-4{grid-template-columns:1fr;}}

  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;}
  .card-title{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .card-value{font-size:22px;font-weight:700;}
  .card-sub{font-size:12px;color:var(--sub);margin-top:4px;}

  .section-title{font-size:15px;font-weight:600;margin:20px 0 10px;border-left:3px solid var(--accent);padding-left:10px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#13161d;color:var(--sub);font-weight:500;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;}
  td{padding:7px 10px;border-bottom:1px solid #1e2128;}
  tr:hover td{background:#1e2330;}

  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
  .buy{background:rgba(39,174,96,.2);color:var(--green);}
  .sell{background:rgba(231,76,60,.2);color:var(--red);}
  .hold{background:rgba(243,156,18,.15);color:var(--yellow);}

  .bar-wrap{height:16px;background:#13161d;border-radius:4px;overflow:hidden;}
  .bar{height:100%;border-radius:4px;transition:width .4s;}

  .chip-pos{color:var(--green);}.chip-neg{color:var(--red);}

  .sector-block{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
  .sector-header{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .sector-header:hover{background:#1e2330;border-radius:8px;}
  .sector-body{display:none;padding:0 8px 8px;overflow-x:auto;}
  .sector-body.open{display:block;}

  .tag{background:#1e2330;border-radius:4px;padding:2px 7px;font-size:11px;color:var(--sub);margin-left:6px;}
  .rsi-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
  .rsi-hot{background:var(--red);}.rsi-warm{background:var(--yellow);}.rsi-ok{background:var(--green);}
  .up{color:var(--green);}.dn{color:var(--red);}

  .error-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center;color:var(--sub);font-size:15px;margin-top:40px;}
  .error-box span{display:block;font-size:36px;margin-bottom:16px;}

  footer{text-align:center;color:var(--sub);font-size:11px;padding:24px;border-top:1px solid var(--border);margin-top:40px;}
  .page-section{display:none;}.page-section.active{display:block;}

  /* 說明欄 */
  .info-box{background:#13161d;border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:12px;color:var(--sub);line-height:1.8;}
  .info-box summary{cursor:pointer;color:var(--blue);font-size:13px;font-weight:600;list-style:none;user-select:none;}
  .info-box summary::before{content:'ℹ️ ';}
  .info-box table{margin-top:10px;border-collapse:collapse;width:100%;}
  .info-box th{color:var(--text);font-weight:600;padding:4px 10px;text-align:left;border-bottom:1px solid var(--border);}
  .info-box td{padding:4px 10px;border-bottom:1px solid #1e2128;}
  .tp{color:#f1c40f;font-weight:600;}

  #loading{text-align:center;padding:60px;color:var(--sub);}
  .wl-add-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
  .wl-add-bar input{background:#13161d;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;width:140px;}
  .wl-add-bar input::placeholder{color:var(--sub);}
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;}
  .btn-primary:hover{opacity:.85;}
  .btn-remove{background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;}
  .btn-remove:hover{border-color:var(--red);color:var(--red);}
  .toast{position:fixed;bottom:24px;right:24px;background:#2d3139;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .btn-add-inline{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;margin-left:4px;}
  .btn-add-inline:hover{background:var(--accent);color:#fff;}

  /* 個股分析 */
  .stock-search-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
  .stock-search-bar input{background:#13161d;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font-size:14px;width:180px;}
  .stock-search-bar input::placeholder{color:var(--sub);}
  .stock-autocomplete{position:relative;}
  .stock-dropdown{position:absolute;top:100%;left:0;background:var(--card);border:1px solid var(--border);border-radius:6px;z-index:100;min-width:220px;max-height:200px;overflow-y:auto;display:none;}
  .stock-dropdown.show{display:block;}
  .stock-dropdown div{padding:7px 12px;cursor:pointer;font-size:13px;}
  .stock-dropdown div:hover{background:#1e2330;}
  .stock-dropdown .dd-sub{font-size:11px;color:var(--sub);}
  /* 個股面板佈局 */
  #sp-header{padding:10px 0 12px;display:none;}
  #sp-header .sp-name{font-size:20px;font-weight:700;}
  #sp-header .sp-meta{font-size:12px;color:var(--sub);margin-top:2px;}
  #sp-header .sp-price-row{display:flex;align-items:baseline;gap:12px;margin-top:6px;}
  #sp-header .sp-price{font-size:32px;font-weight:700;}
  #sp-header .sp-chg{font-size:16px;font-weight:600;}
  #sp-header .sp-time{font-size:11px;color:var(--sub);margin-left:auto;align-self:flex-end;}
  #sp-main{display:none;gap:10px;align-items:flex-start;}
  #sp-left{flex:7;min-width:0;}
  #sp-right{flex:3;min-width:240px;max-width:320px;display:flex;flex-direction:column;gap:8px;}
  #sp-mini-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  #sp-bottom{display:none;gap:10px;flex-wrap:wrap;margin-top:10px;}
  #sp-bottom .card{flex:1;min-width:200px;}
  .sp-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
  .sp-card h3{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .sp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .sp-row:last-child{border-bottom:none;}
  .sp-row .lbl{color:var(--sub);}
  .sp-row .val{font-weight:600;}
  .up{color:var(--green);}.dn{color:var(--red);}.flat{color:var(--sub);}
  #sp-signal-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  #sp-signal-label{font-size:16px;font-weight:700;}
  #sp-signal-desc{font-size:12px;color:var(--sub);margin-top:3px;}
  .prob-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:6px 0;}
  .prob-up{background:var(--green);}.prob-neu{background:var(--blue);}.prob-dn{background:var(--red);}
  .prob-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);}
  .sp-pattern-item{padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .sp-pattern-item:last-child{border-bottom:none;}
  .sp-pattern-item .pt{font-weight:600;} .sp-pattern-item .pd{font-size:11px;color:var(--sub);}
  .chip-table{width:100%;border-collapse:collapse;font-size:12px;}
  .chip-table th{color:var(--sub);text-align:right;padding:3px 6px;font-weight:500;}
  .chip-table th:first-child{text-align:left;}
  .chip-table td{text-align:right;padding:3px 6px;}
  .chip-table td:first-child{text-align:left;color:var(--sub);}
  .chart-box{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .fund-tab {
    padding: 4px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--sub);
    cursor: pointer;
    font-size: 13px;
  }
  .fund-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
</style>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

<body>
<header>
  <h1>📊 台股族群掃描</h1>
  <nav>
    <a id="nav-daily"     onclick="setPage('daily')">今日掃描</a>
    <a id="nav-weekly"    onclick="setPage('weekly')">週報</a>
    <a id="nav-mainforce" onclick="setPage('mainforce')">🎯 主力觀察</a>
    <a id="nav-stock"     onclick="setPage('stock')">🔍 個股分析</a>
    <a id="nav-watchlist" onclick="setPage('watchlist')">⭐ 自選清單</a>
  </nav>
  <div class="date-picker" id="date-picker-wrap">
    <button class="date-nav" id="btn-prev" onclick="stepDate(-1)">◀</button>
    <label>日期</label>
    <select id="date-select" onchange="loadDate(this.value)"></select>
    <button class="date-nav" id="btn-next" onclick="stepDate(1)">▶</button>
  </div>
</header>

<main>
  <div id="loading">載入中…</div>
  <div id="page-daily"     class="page-section"></div>
  <div id="page-weekly"    class="page-section"></div>
  <div id="page-mainforce" class="page-section"></div>
  <div id="page-stock"     class="page-section"></div>
  <div id="page-watchlist" class="page-section"></div>
</main>

<footer>資料來源：twstock / FinMind　｜　每個工作日 14:32 自動更新</footer>

<script>
// ── 全域狀態 ──────────────────────────────────────────────────────────────────
let DATES   = [];      // 可用日期清單（降冪）
let CACHE   = {};      // date -> payload
let HISTORY = {};      // date -> payload（趨勢用）
let CUR_DATE = '';
let CUR_PAGE = 'daily';
let WEEKLY_DATA = null;
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw14G5uB-Aic9KAtcH_aNhgRJKpOhC9LQWYN9vuNwSQePbFto2oFJ71oWrsugtuvSnSzw/exec';
let WL_DATA = null;

let _toastTimer = null;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.classList.remove('show'); _toastTimer = null; }, 3000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function loadWatchlist(silent=false) {
  if (!APPS_SCRIPT_URL) {
    document.getElementById('page-watchlist').innerHTML =
      '<div class="error-box"><span>⚙️</span>請先設定 APPS_SCRIPT_URL</div>';
    return;
  }
  if (!silent) document.getElementById('page-watchlist').innerHTML = '<div id="loading">載入中…</div>';
  try {
    const data = await fetchJSON(`${APPS_SCRIPT_URL}?action=list`);
    WL_DATA = data;
    renderWatchlist(data);
  } catch(e) {
    document.getElementById('page-watchlist').innerHTML =
      '<div class="error-box"><span>❌</span>載入失敗，請重試</div>';
  }
}

function renderWatchlist(data) {
  const stocks = (data && data.stocks) || [];
  const updated = data && data.updated_at
    ? new Date(data.updated_at).toLocaleString('zh-TW', {timeZone:'Asia/Taipei'})
    : '';

  let html = `
  <div class="wl-add-bar">
    <input id="wl-input" type="text" placeholder="輸入代碼 例：2330" maxlength="6"
      onkeydown="if(event.key==='Enter')wlAdd()">
    <button class="btn-primary" onclick="wlAdd()">＋ 新增</button>
    <span id="wl-msg" style="font-size:12px;color:var(--sub)"></span>
  </div>`;

  if (!stocks.length) {
    html += `<div class="error-box" style="margin-top:0"><span>📋</span>尚無自選股票，請輸入代碼新增</div>`;
  } else {
    html += `<div class="card" style="overflow-x:auto"><table>
      <tr>
        <th>代碼</th><th>名稱</th><th>現價</th><th>漲跌幅</th>
        <th>RSI5/10</th><th>20日%</th><th>訊號</th><th>法人合計</th><th>操作</th>
      </tr>
      ${stocks.sort((a,b)=>{
        const sa = a.signal && a.signal!=='' && a.signal!=='—' ? 0 : 1;
        const sb = b.signal && b.signal!=='' && b.signal!=='—' ? 0 : 1;
        return sa - sb || a.id.localeCompare(b.id);
      }).map(s => `<tr>
        <td><b>${escHtml(s.id)}</b></td>
        <td>${escHtml(s.name)}</td>
        <td>${s.price!==''&&s.price!==null ? fmt(s.price,1) : '—'}</td>
        <td class="${Number(s.change_pct)>=0?'up':'dn'}">${s.change_pct!==''&&s.change_pct!==null ? sign(Number(s.change_pct))+fmt(s.change_pct,2)+'%' : '—'}</td>
        <td>${s.rsi!==''&&s.rsi!==null ? `<span class="rsi-dot ${rsiDot(Number(s.rsi))}"></span>${fmt(s.rsi,1)}<span style="color:var(--sub);font-size:11px">/${s.rsi10!=null&&s.rsi10!==''?fmt(s.rsi10,1):'—'}</span>` : '—'}</td>
        <td class="${signColor(Number(s.ret20))}">${s.ret20!==''&&s.ret20!==null ? sign(Number(s.ret20))+fmt(s.ret20)+'%' : '—'}</td>
        <td>${s.signal ? badge(s.signal) : '—'}</td>
        <td>${chip(s.chip_total)}</td>
        <td><button class="btn-remove" onclick="wlRemove('${escHtml(s.id)}')">✕</button></td>
      </tr>`).join('')}
    </table></div>`;
  }

  html += `<div style="margin-top:10px;font-size:11px;color:var(--sub)">
    最後更新：${updated}&nbsp;&nbsp;
    <button class="date-nav" onclick="loadWatchlist()">↻ 重新整理</button>
  </div>`;

  document.getElementById('page-watchlist').innerHTML = html;
}

async function wlAdd(idOverride) {
  if (!APPS_SCRIPT_URL) { showToast('請先設定 APPS_SCRIPT_URL'); return; }
  const id = (idOverride || document.getElementById('wl-input')?.value || '').trim().toUpperCase();
  if (!id) return;
  const msg = document.getElementById('wl-msg');
  if (msg) msg.textContent = '新增中…';
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',

      body: JSON.stringify({ action: 'add', id }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`✓ ${id} ${data.name} 已加入自選清單`);
      if (document.getElementById('wl-input')) document.getElementById('wl-input').value = '';
      loadWatchlist(true);
    } else {
      const msgs = { duplicate:'已在清單中', limit_reached:'自選清單已達 50 檔上限', not_found:'代碼無效，請確認股票代碼' };
      showToast(msgs[data.error] || `新增失敗：${data.error}`);
    }
  } catch { showToast('新增失敗，請重試'); }
  if (msg) msg.textContent = '';
}

async function wlRemove(id) {
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',

      body: JSON.stringify({ action: 'remove', id }),
    });
    const data = await res.json();
    if (data.ok) { showToast(`${id} 已從自選清單移除`); loadWatchlist(true); }
    else showToast(`移除失敗：${data.error}`);
  } catch { showToast('移除失敗，請重試'); }
}

// ── 輔助函式 ──────────────────────────────────────────────────────────────────
function fmt(v,d=1){return v===''||v===null||v===undefined?'—':(typeof v==='number'?v.toFixed(d):v);}
function sign(v){return v>0?'+':'';}
function signColor(v){return v>0?'up':'dn';}
function rsiDot(r){return r>70?'rsi-hot':r>60?'rsi-warm':'rsi-ok';}
function badge(s){const m={BUY:'buy',SELL:'sell',HOLD:'hold'};return `<span class="badge ${m[s]||'hold'}">${s}</span>`;}
function chip(v){if(v===''||v===null||v===undefined)return '—';const n=Number(v);return `<span class="${n>=0?'chip-pos':'chip-neg'}">${sign(n)}${n.toLocaleString()}</span>`;}
function fmtDate(d){return d?`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`:d;}

async function fetchJSON(url){
  const r = await fetch(url, {cache:'no-cache'});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── 個股分析 ──────────────────────────────────────────────────────────────────
let STOCKS_INDEX = [];

async function initStockPage(){
  const el = document.getElementById('page-stock');
  if(el.dataset.init) return;
  el.dataset.init = '1';

  const bust = Math.floor(Date.now()/86400000);
  try{ STOCKS_INDEX = await fetchJSON(`./stocks_index.json?v=${bust}`); }catch{}

  el.innerHTML = `
    <div class="stock-search-bar">
      <div class="stock-autocomplete">
        <input id="stock-input" placeholder="輸入代碼或名稱" autocomplete="off"
               oninput="stockSuggest(this.value)"
               onkeydown="if(event.key==='Enter')loadStock(document.getElementById('stock-input').value.trim())">
        <div class="stock-dropdown" id="stock-dd"></div>
      </div>
      <button class="btn-primary" onclick="loadStock(document.getElementById('stock-input').value.trim())">分析</button>
      <span id="sp-status" style="font-size:12px;color:var(--sub);"></span>
    </div>
    <div id="sp-header"></div>
    <div id="sp-main" style="display:none;gap:10px;align-items:flex-start;">
      <div id="sp-left" style="flex:7;min-width:0;">
        <div class="chart-box" id="sp-main-chart"></div>
        <div id="sp-mini-row" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <div class="chart-box" id="sp-kd-chart"></div>
          <div class="chart-box" id="sp-chip-chart"></div>
        </div>
      </div>
      <div id="sp-right" style="flex:3;min-width:240px;max-width:320px;display:flex;flex-direction:column;gap:8px;">
        <div class="sp-card">
          <h3>主力燈號</h3>
          <div style="display:flex;align-items:center;gap:10px;">
            <div id="sp-signal-dot" style="width:14px;height:14px;border-radius:50%;flex-shrink:0;"></div>
            <div><div id="sp-signal-label" style="font-size:16px;font-weight:700;"></div>
                 <div id="sp-signal-desc" style="font-size:12px;color:var(--sub);margin-top:3px;"></div></div>
          </div>
        </div>
        <div class="sp-card"><h3>技術面摘要</h3><div id="sp-summary-rows"></div></div>
        <div class="sp-card"><h3>近期法人籌碼</h3><div id="sp-chip-summary"></div></div>
        <div class="sp-card"><h3>AI 勝率預測</h3><div id="sp-pred-content"></div></div>
      </div>
    </div>
    <div id="sp-bottom" style="display:none;gap:10px;flex-wrap:wrap;margin-top:10px;">
      <div class="sp-card" style="flex:1;min-width:200px;"><h3>型態分析</h3><div id="sp-pattern-list"></div></div>
      <div class="sp-card" style="flex:1;min-width:200px;"><h3>關鍵價位</h3><div id="sp-levels-rows"></div></div>
      <div class="sp-card" style="flex:1;min-width:200px;"><h3>操作建議</h3><div id="sp-suggest" style="font-size:13px;line-height:1.7;color:var(--sub);"></div></div>
    </div>
    <div id="sp-mj-signals" style="display:none;"></div>
    <!-- 基本面 -->
    <div class="sp-card" style="width:100%;margin-top:8px;">
      <h3>基本面</h3>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="fund-tab active" onclick="switchFundTab('revenue',this)">月營收</button>
        <button class="fund-tab" onclick="switchFundTab('eps',this)">EPS</button>
        <button class="fund-tab" onclick="switchFundTab('margins',this)">三率</button>
      </div>
      <div id="fund-revenue"></div>
      <div id="fund-eps" style="display:none"></div>
      <div id="fund-margins" style="display:none"></div>
    </div>`;

  document.addEventListener('click', e=>{
    if(!e.target.closest('.stock-autocomplete'))
      document.getElementById('stock-dd').classList.remove('show');
  });
}

function stockSuggest(q){
  const dd = document.getElementById('stock-dd');
  if(!q || q.length < 1){ dd.classList.remove('show'); return; }
  const hits = STOCKS_INDEX.filter(s=>s.id.startsWith(q)||s.name.includes(q)).slice(0,8);
  if(!hits.length){ dd.classList.remove('show'); return; }
  dd.innerHTML = hits.map(s=>`
    <div onclick="document.getElementById('stock-input').value='${s.id}';document.getElementById('stock-dd').classList.remove('show');loadStock('${s.id}')">
      <b>${s.id}</b> ${s.name} <span class="dd-sub">${s.sector}</span>
    </div>`).join('');
  dd.classList.add('show');
}

async function loadStock(sid){
  if(!sid) return;
  document.getElementById('stock-dd').classList.remove('show');
  const st = document.getElementById('sp-status');
  st.textContent = '載入中…';
  ['sp-main','sp-bottom'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('sp-header').innerHTML='';
  ['fund-revenue','fund-eps','fund-margins'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML='<div style="color:var(--sub);font-size:13px;padding:8px;">載入中…</div>';
  });

  const bust = Math.floor(Date.now()/86400000);
  let data;
  try{ data = await fetchJSON(`./stocks/${sid}.json?v=${bust}`); }
  catch{
    st.textContent = `⚠ 找不到 ${sid} 的資料`;
    return;
  }
  st.textContent = `已載入 ${data.name}（${data.stock_id||data.id}）· ${data.generated_at||''}`;
  spRender(data);
}

// ── Render ──────────────────────────────────────────────────────────────────
function spRender(d){
  // Header
  const hEl = document.getElementById('sp-header');
  const cp = d.quote?.change_pct ?? 0;
  const cs = d.quote?.change ?? 0;
  const cls = cp>0?'up':cp<0?'dn':'flat';
  const sgn = cp>0?'+':'';
  hEl.innerHTML = `
    <div style="padding:10px 0 12px;">
      <div style="font-size:20px;font-weight:700;">${d.name}（${d.stock_id||d.id}）</div>
      <div style="font-size:12px;color:var(--sub);margin-top:2px;">${d.industry||d.sector||''}</div>
      <div style="display:flex;align-items:baseline;gap:12px;margin-top:6px;">
        <span style="font-size:32px;font-weight:700;">${d.quote?.close?.toFixed(1)??'—'}</span>
        <span class="${cls}" style="font-size:16px;font-weight:600;">${cp!=null?`${sgn}${cs?.toFixed(2)} (${sgn}${cp?.toFixed(2)}%)`:'—'}</span>
        <span style="font-size:11px;color:var(--sub);margin-left:auto;">${d.generated_at||''}</span>
      </div>
    </div>`;

  document.getElementById('sp-main').style.display='flex';
  document.getElementById('sp-bottom').style.display='flex';

  spRenderMainChart(d);
  spRenderKDChart(d);
  spRenderChipChart(d);
  spRenderSignal(d.signal);
  spRenderSummary(d.summary);
  spRenderChipSummary(d.chip);
  spRenderPrediction(d.prediction);
  spRenderPatterns(d.patterns);
  spRenderLevels(d.levels);
  spRenderSuggestion(d);
  spRenderMJSignals(d.mj_signals);
  loadFundamentals(d.stock_id);
}

// ── 基本面 ──────────────────────────────────────────────────────────────────
let _fundData = null;
let _fundLoaded = false;

function switchFundTab(tab, btn) {
  document.querySelectorAll('.fund-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['revenue', 'eps', 'margins'].forEach(t => {
    document.getElementById('fund-' + t).style.display = t === tab ? '' : 'none';
  });
  if (_fundLoaded && _fundData) {
    if (tab === 'eps')     renderFundEps(_fundData);
    if (tab === 'margins') renderFundMargins(_fundData);
  }
}

function loadFundamentals(stockId) {
  _fundData = null;
  _fundLoaded = false;
  ['revenue','eps','margins'].forEach(t => {
    const el = document.getElementById('fund-' + t);
    if (el) el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">載入中…</div>';
  });
  fetchJSON(`./fundamentals/${stockId}.json`)
    .then(d => { _fundData = d; _fundLoaded = true; renderFundRevenue(d); })
    .catch(() => {
      ['revenue','eps','margins'].forEach(t => {
        const el = document.getElementById('fund-' + t);
        if (el) el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">— 無基本面資料</div>';
      });
    });
}

function renderFundEps(d) {
  const el = document.getElementById('fund-eps');
  if (el) el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">EPS 資料載入中…</div>';
}

function renderFundMargins(d) {
  const el = document.getElementById('fund-margins');
  if (el) el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">三率資料載入中…</div>';
}

function renderFundRevenue(d) {
  const el = document.getElementById('fund-revenue');
  if (!d || !d.revenue) {
    el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">— 無月營收資料</div>';
    return;
  }
  const r = d.revenue;
  const latest = r.revenue[r.revenue.length - 1];
  const latestYoy = r.yoy[r.yoy.length - 1];
  const latestMom = r.mom[r.mom.length - 1];
  const latestCumYoy = r.cum_yoy[r.cum_yoy.length - 1];

  const signColor = v => v == null ? 'var(--sub)' : v >= 0 ? 'var(--green)' : 'var(--red)';
  const fmtPct = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
  const fmtRev = v => v == null ? '—' : (v / 1e8).toFixed(1) + ' 億';

  let html = `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;">
    <div class="card" style="min-width:100px;text-align:center">
      <div class="card-title">最新月營收</div>
      <div class="card-value" style="font-size:16px">${fmtRev(latest)}</div>
    </div>
    <div class="card" style="min-width:80px;text-align:center">
      <div class="card-title">YoY</div>
      <div class="card-value" style="font-size:16px;color:${signColor(latestYoy)}">${fmtPct(latestYoy)}</div>
    </div>
    <div class="card" style="min-width:80px;text-align:center">
      <div class="card-title">MoM</div>
      <div class="card-value" style="font-size:16px;color:${signColor(latestMom)}">${fmtPct(latestMom)}</div>
    </div>
    <div class="card" style="min-width:100px;text-align:center">
      <div class="card-title">累計 YoY</div>
      <div class="card-value" style="font-size:16px;color:${signColor(latestCumYoy)}">${fmtPct(latestCumYoy)}</div>
    </div>
  </div>`;

  html += `<div id="fund-rev-chart" style="height:220px;"></div>`;

  html += `<table style="width:100%;font-size:12px;margin-top:8px"><tr>
    <th>月份</th><th>月營收（億）</th><th>MoM</th><th>YoY</th></tr>`;
  const showN = Math.min(r.month.length, 24);
  for (let i = r.month.length - 1; i >= r.month.length - showN; i--) {
    html += `<tr>
      <td>${r.month[i]}</td>
      <td>${fmtRev(r.revenue[i])}</td>
      <td style="color:${signColor(r.mom[i])}">${fmtPct(r.mom[i])}</td>
      <td style="color:${signColor(r.yoy[i])}">${fmtPct(r.yoy[i])}</td>
    </tr>`;
  }
  html += '</table>';
  el.innerHTML = html;

  const revB = r.revenue.map(v => +(v / 1e8).toFixed(2));
  Plotly.newPlot('fund-rev-chart', [
    {
      x: r.month, y: revB, type: 'bar', name: '月營收（億）',
      marker: { color: _PLY.acc },
    },
    {
      x: r.month, y: r.yoy, type: 'scatter', mode: 'lines+markers',
      name: 'YoY %', yaxis: 'y2',
      line: { color: _PLY.up, width: 1.5 },
      marker: { size: 4 },
    },
  ], {
    margin: { t: 10, b: 40, l: 45, r: 45 },
    paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
    font: _PLY.font,
    legend: { orientation: 'h', y: -0.2 },
    yaxis:  { gridcolor: _PLY.grid },
    yaxis2: { overlaying: 'y', side: 'right', showgrid: false, ticksuffix: '%' },
    xaxis:  { tickangle: -45 },
  }, { responsive: true, displayModeBar: false });
}

const _PLY = {
  bg:'#161b22', plot:'#161b22', font:{color:'#e6edf3',size:11},
  grid:'#30363d', up:'#26a641', dn:'#f85149', neu:'#58a6ff', acc:'#bc8cff',
};
const _pLine=(name,x,y,color,dash,xax,yax)=>({
  type:'scatter',mode:'lines',name,x,y,
  line:{color,width:1.5,dash:dash||'solid'},xaxis:xax||'x',yaxis:yax||'y',
});

function spRenderMainChart(d){
  const dates=d.ohlcv.date, I=d.indicators;
  const traces=[
    {type:'candlestick',name:'K線',x:dates,
     open:d.ohlcv.open,high:d.ohlcv.high,low:d.ohlcv.low,close:d.ohlcv.close,
     increasing:{line:{color:_PLY.up},fillcolor:_PLY.up},
     decreasing:{line:{color:_PLY.dn},fillcolor:_PLY.dn},xaxis:'x',yaxis:'y'},
    {type:'bar',name:'成交量',x:dates,y:d.ohlcv.volume,
     marker:{color:d.ohlcv.close.map((c,i)=>i===0?_PLY.neu:c>=(d.ohlcv.open[i]??c)?_PLY.up:_PLY.dn)},
     xaxis:'x2',yaxis:'y2'},
    {type:'bar',name:'MACD柱',x:dates,y:I.macd_hist,
     marker:{color:I.macd_hist.map(v=>v==null?'#555':v>=0?_PLY.up:_PLY.dn)},
     xaxis:'x3',yaxis:'y3'},
    _pLine('BB上軌',dates,I.bb_upper,'#555','dash'),
    _pLine('BB下軌',dates,I.bb_lower,'#555','dash'),
    _pLine('BB中軌',dates,I.bb_mid,'#444'),
    _pLine('MA5',dates,I.ma5,'#f0b429'),
    _pLine('MA20',dates,I.ma20,'#58a6ff'),
    _pLine('MA60',dates,I.ma60,'#bc8cff'),
    _pLine('DIF',dates,I.macd,_PLY.neu,null,'x3','y3'),
    _pLine('Signal',dates,I.macd_signal,_PLY.dn,null,'x3','y3'),
  ];
  // MJ 訊號三角標記
  if(d.mj_signals && d.mj_signals.length){
    const lowMap={}, highMap={};
    dates.forEach((dt,i)=>{ lowMap[dt]=d.ohlcv.low[i]; highMap[dt]=d.ohlcv.high[i]; });
    const longs  = d.mj_signals.filter(s=>s.signal==='LONG');
    const shorts = d.mj_signals.filter(s=>s.signal==='SHORT');
    if(longs.length) traces.push({
      type:'scatter',mode:'markers',name:'MJ做多',
      x:longs.map(s=>s.date),
      y:longs.map(s=>(lowMap[s.date]??s.close)*0.994),
      marker:{symbol:'triangle-up',size:10,color:'#27ae60'},
      xaxis:'x',yaxis:'y',hovertext:longs.map(s=>`做多 J=${s.kd_j} OSC=${s.macd_osc}`),
    });
    if(shorts.length) traces.push({
      type:'scatter',mode:'markers',name:'MJ做空',
      x:shorts.map(s=>s.date),
      y:shorts.map(s=>(highMap[s.date]??s.close)*1.006),
      marker:{symbol:'triangle-down',size:10,color:'#e74c3c'},
      xaxis:'x',yaxis:'y',hovertext:shorts.map(s=>`做空 J=${s.kd_j} OSC=${s.macd_osc}`),
    });
  }
  Plotly.react('sp-main-chart',traces,{
    paper_bgcolor:_PLY.bg,plot_bgcolor:_PLY.bg,font:_PLY.font,
    margin:{l:50,r:10,t:30,b:20},height:520,showlegend:false,
    grid:{rows:3,columns:1,pattern:'independent'},
    xaxis:{type:'category',showgrid:false,rangeslider:{visible:false},tickfont:{size:10}},
    xaxis2:{type:'category',showgrid:false,tickfont:{size:10}},
    xaxis3:{type:'category',showgrid:false,tickfont:{size:10}},
    yaxis:{gridcolor:_PLY.grid,domain:[0.38,1]},
    yaxis2:{gridcolor:_PLY.grid,domain:[0.22,0.36]},
    yaxis3:{gridcolor:_PLY.grid,domain:[0,0.20]},
  },{responsive:true,displayModeBar:false});
}

function spRenderKDChart(d){
  const dates=d.ohlcv.date, I=d.indicators;
  const traces=[
    {type:'scatter',mode:'lines',name:'K',x:dates,y:I.kd_k,line:{color:'#f0b429',width:1.5}},
    {type:'scatter',mode:'lines',name:'D',x:dates,y:I.kd_d,line:{color:_PLY.neu,width:1.5}},
    {type:'scatter',mode:'lines',x:dates,y:dates.map(()=>80),showlegend:false,
     line:{color:_PLY.dn,width:1,dash:'dot'}},
    {type:'scatter',mode:'lines',x:dates,y:dates.map(()=>20),showlegend:false,
     line:{color:_PLY.up,width:1,dash:'dot'}},
  ];
  if(I.kd_j){
    traces.push({type:'scatter',mode:'lines',name:'J',x:dates,y:I.kd_j,
      line:{color:'#ff6b6b',width:1.2}});
    traces.push({type:'scatter',mode:'lines',x:dates,y:dates.map(()=>0),showlegend:false,
      line:{color:'rgba(255,255,255,0.25)',width:1,dash:'dot'}});
  }
  Plotly.react('sp-kd-chart',traces,{
    paper_bgcolor:_PLY.bg,plot_bgcolor:_PLY.bg,font:_PLY.font,
    margin:{l:40,r:10,t:24,b:30},height:180,
    title:{text:'KD(9,3,3) + J 線',font:{size:12},x:0.04},
    xaxis:{type:'category',showgrid:false,tickfont:{size:9},rangeslider:{visible:false}},
    yaxis:{gridcolor:_PLY.grid},
    legend:{orientation:'h',x:0.5,xanchor:'center',y:1.15,font:{size:10}},
  },{responsive:true,displayModeBar:false});
}

function spRenderChipChart(d){

    paper_bgcolor:_PLY.bg,plot_bgcolor:_PLY.bg,font:_PLY.font,

    barmode:'relative',
    xaxis:{type:'category',showgrid:false,tickfont:{size:9}},

    legend:{orientation:'h',x:0.5,xanchor:'center',y:1.15,font:{size:10}},

function spRenderSignal(sig){
  if(!sig) return;
  document.getElementById('sp-signal-dot').style.background = sig.color||'#95a5a6';
  document.getElementById('sp-signal-label').textContent = sig.label||'—';
  document.getElementById('sp-signal-desc').textContent  = sig.desc||'';
}

function spRenderSummary(summary){
  const el=document.getElementById('sp-summary-rows');
  el.innerHTML=(summary||[]).map(r=>{
    const cls=r.direction==='up'?'up':r.direction==='down'?'dn':'flat';
    return `<div class="sp-row"><span class="lbl">${r.label}</span><span class="val ${cls}">${r.value}</span></div>`;
  }).join('');
}

function spRenderChipSummary(chip){
  const el=document.getElementById('sp-chip-summary');
  if(!chip||!chip.dates||!chip.dates.length){
    el.innerHTML='<div style="color:var(--sub);font-size:12px;">無資料</div>'; return;
  }
  const sumN=(arr,n)=>arr.slice(-n).filter(v=>v!=null).reduce((a,b)=>a+b,0);
  [
    {label:'外資 5日',  val:sumN(chip.foreign,5)},
    {label:'投信 5日',  val:sumN(chip.trust,5)},
    {label:'自營 5日',  val:sumN(chip.dealer,5)},
    {label:'合計 10日', val:sumN(chip.total,10)},
  ].forEach(r=>{
    const cls=r.val>0?'up':r.val<0?'dn':'flat';
    const sgn=r.val>0?'+':'';
    el.innerHTML+=`<div class="sp-row"><span class="lbl">${r.label}</span><span class="val ${cls}">${sgn}${r.val.toFixed(0)} 張</span></div>`;
  });
}

function spRenderPrediction(pred){
  const el=document.getElementById('sp-pred-content');
  if(!pred){el.innerHTML='—';return;}
  const up=((pred.up||0)*100).toFixed(0);
  const sid=((pred.sideways||0)*100).toFixed(0);
  const dn=((pred.down||0)*100).toFixed(0);
  const acc=((pred.accuracy||0)*100).toFixed(0);
  el.innerHTML=`
    <div class="prob-bar">
      <div class="prob-up" style="width:${up}%"></div>
      <div class="prob-neu" style="width:${sid}%"></div>
      <div class="prob-dn"  style="width:${dn}%"></div>
    </div>
    <div class="prob-labels">
      <span class="up">↑ ${up}%</span><span class="flat">→ ${sid}%</span><span class="dn">↓ ${dn}%</span>
    </div>
    <div style="font-size:11px;color:var(--sub);margin-top:6px;">參考準確率 ${acc}%</div>`;
}

function spRenderPatterns(patterns){
  const el=document.getElementById('sp-pattern-list');
  if(!patterns||!patterns.length){
    el.innerHTML='<div style="color:var(--sub);font-size:12px;">未偵測到明顯型態</div>'; return;
  }
  el.innerHTML=patterns.map(p=>
    `<div class="sp-pattern-item"><div class="pt">${p.label}</div><div class="pd">${p.desc} · ${p.date}</div></div>`
  ).join('');
}

function spRenderLevels(levels){
  const el=document.getElementById('sp-levels-rows');
  if(!levels){el.innerHTML='—';return;}
  const map={resistance:['壓力區間','dn'],pullback:['回調區間','flat'],support:['支撐區間','up'],
             breakout:['突破點','dn'],breakdown:['跌破點','up']};
  el.innerHTML=Object.entries(map).map(([k,[label,cls]])=>{
    const v=levels[k]; if(v==null) return '';
    return `<div class="sp-row"><span class="lbl">${label}</span><span class="val ${cls}">${typeof v==='number'?v.toFixed(1):v}</span></div>`;
  }).join('');
}

function spRenderSuggestion(d){
  const el=document.getElementById('sp-suggest');
  const pred=d.prediction, sig=d.signal, summary=d.summary||[];
  const trend=summary.find(s=>s.label==='趨勢方向')?.value||'—';
  const bb=summary.find(s=>s.label==='布林位置')?.value||'—';
  let text=`目前趨勢：${trend}，布林：${bb}。<br>主力燈號：${sig?.label||'—'}。`;
  if(pred){
    const maxDir=pred.up>pred.down?(pred.up>pred.sideways?'上漲':'盤整'):(pred.down>pred.sideways?'下跌':'盤整');
    text+=`<br>AI 預測明日最可能：${maxDir}。`;
  }
  el.innerHTML=text;
}

function spRenderMJSignals(signals){
  const el=document.getElementById('sp-mj-signals');
  if(!el) return;
  if(!signals||!signals.length){ el.style.display='none'; return; }
  const recent=signals.slice(-10).reverse();
  el.style.display='block';
  el.innerHTML=`
    <div class="sp-card" style="margin-top:10px;">
      <h3>📍 MJ 強化版入場訊號（近期）</h3>
      <div style="overflow-x:auto;">
        <table class="chip-table" style="font-size:12px;">
          <tr>
            <th style="text-align:left;">日期</th>
            <th>方向</th>
            <th>收盤</th>
            <th>J值</th>
            <th>OSC</th>
          </tr>
          ${recent.map(s=>{
            const isLong=s.signal==='LONG';
            const cls=isLong?'up':'dn';
            const label=isLong?'▲ 做多':'▽ 做空';
            return `<tr>
              <td style="text-align:left;">${s.date}</td>
              <td class="${cls}" style="font-weight:600;">${label}</td>
              <td>${s.close}</td>
              <td class="${cls}">${s.kd_j}</td>
              <td class="${cls}">${s.macd_osc}</td>
            </tr>`;
          }).join('')}
        </table>
      </div>
    </div>`;
}

// ── 初始化 ───────────────────────────────────────────────────────────────────
async function init(){
  const bust = Math.floor(Date.now()/86400000);
  try{
    DATES = await fetchJSON(`./dates.json?v=${bust}`);
  }catch{
    // 降級：只有 daily.json
    try{
      const d = await fetchJSON('./daily.json');
      const ds = d.meta?.['掃描日期']||'';
      DATES = ds?[ds]:[];
      if(ds) CACHE[ds] = d;
    }catch{
      showError('無法載入資料，請確認 GitHub Pages 部署完成');
      return;
    }
  }

  if(!DATES.length){showError('目前尚無歷史資料');return;}

  buildDateSelect();
  CUR_DATE = DATES[0];

  // 嘗試預載週報
  fetchJSON(`./weekly.json?v=${bust}`).then(d=>{WEEKLY_DATA=d;}).catch(()=>{});

  await loadDate(CUR_DATE);
  setPage('daily');
}

function buildDateSelect(){
  const sel = document.getElementById('date-select');
  sel.innerHTML = DATES.map(d=>`<option value="${d}">${fmtDate(d)}</option>`).join('');
}

// ── 切換頁面 ──────────────────────────────────────────────────────────────────
function setPage(page){
  CUR_PAGE = page;
  ['daily','weekly','mainforce','stock','watchlist'].forEach(p=>{
    document.getElementById(`nav-${p}`).classList.toggle('active', p===page);
    document.getElementById(`page-${p}`).classList.toggle('active', p===page);
  });
  // 主力觀察與今日掃描共用同一份 daily payload，所以也需要日期選擇器
  document.getElementById('date-picker-wrap').style.display =
    (page==='daily' || page==='mainforce') ? '' : 'none';
  if(page==='weekly')    renderWeekly();
  if(page==='watchlist') loadWatchlist();
  if(page==='stock')     initStockPage();
  if(page==='mainforce') renderMainForce(CACHE[CUR_DATE]);
}

// ── 日期導航 ──────────────────────────────────────────────────────────────────
async function loadDate(dateStr){
  CUR_DATE = dateStr;
  document.getElementById('date-select').value = dateStr;
  document.getElementById('btn-prev').disabled = DATES.indexOf(dateStr) >= DATES.length-1;
  document.getElementById('btn-next').disabled = DATES.indexOf(dateStr) <= 0;

  if(!CACHE[dateStr]){
    const bust = Math.floor(Date.now()/86400000); // 每天換一次
    try{
      CACHE[dateStr] = await fetchJSON(`./${dateStr}.json?v=${bust}`);
    }catch{
      try{
        CACHE[dateStr] = await fetchJSON(`./daily.json?v=${bust}`);
      }catch{
        showError(`無法載入 ${fmtDate(dateStr)} 的資料`);
        return;
      }
    }
  }
  renderDaily(CACHE[dateStr]);
  if(CUR_PAGE==='mainforce') renderMainForce(CACHE[dateStr]);
  document.getElementById('loading').style.display='none';
}

function stepDate(dir){
  const idx = DATES.indexOf(CUR_DATE);
  const next = idx - dir;  // DATES 降冪，-1=往前=更小 index
  if(next>=0 && next<DATES.length) loadDate(DATES[next]);
}

// ── 今日掃描 ──────────────────────────────────────────────────────────────────
function renderDaily(data){
  const {meta,qualified,sectors,chips,stocks} = data;
  const date   = meta['掃描日期']||'—';
  const idx    = meta['加權指數'];
  const chg    = meta['漲跌幅%'];
  const strong = meta['強勢族群']||'無';
  const weak   = meta['弱勢族群']||'無';
  const qCount = meta['雙條件推薦']||0;

  let html=`
  <div class="grid-4" style="grid-template-columns:repeat(4,1fr)">
    <div class="card"><div class="card-title">掃描日期</div><div class="card-value" style="font-size:18px">${fmtDate(date)}</div></div>
    <div class="card"><div class="card-title">加權指數</div>
      <div class="card-value ${signColor(Number(chg))}">${idx?Number(idx).toLocaleString():'—'}</div>
      <div class="card-sub">${chg!==''&&chg!==null&&chg!==undefined?sign(Number(chg))+Number(chg).toFixed(2)+'%':''}</div></div>
    <div class="card"><div class="card-title">強勢族群</div><div class="card-value" style="font-size:14px;line-height:1.6">${strong}</div></div>
    <div class="card"><div class="card-title">弱勢族群</div><div class="card-value" style="font-size:14px;line-height:1.6">${weak||'無'}</div></div>
  </div>
  <div class="card" style="margin-bottom:16px;display:flex;align-items:center;gap:16px">
    <div class="card-title" style="margin:0;min-width:80px">雙條件推薦</div>
    <div class="card-value" style="font-size:20px;color:var(--yellow)">${qCount} 檔</div>
  </div>`;

  if(qualified&&qualified.length){
    html+=`<div class="section-title">⭐ 雙條件推薦個股</div>
    <div class="card" style="overflow-x:auto;margin-bottom:20px"><table>
      <tr><th>代碼</th><th>族群</th><th>名稱</th><th>現價</th><th>RSI5/10</th><th>CV夏普</th></tr>
      ${qualified.map(q=>`<tr>
        <td><b>${q.id}</b></td><td>${q.sector}</td><td>${q.name}</td>
        <td>${fmt(q.price,1)}</td>
        <td><span class="rsi-dot ${rsiDot(Number(q.rsi))}"></span>${fmt(q.rsi,1)}<span style="color:var(--sub);font-size:11px">/${q.rsi10!=null&&q.rsi10!==''?fmt(q.rsi10,1):'—'}</span></td>
        <td>${fmt(q.cv_sharpe,2)}</td>
      </tr>`).join('')}
    </table></div>`;
  }

  // 族群強弱表
  html+=`<div class="section-title">族群強弱</div><div class="card" style="overflow-x:auto"><table>
    <tr><th>族群</th><th>20日報酬%</th><th></th><th>RSI5/10</th><th>BUY訊號</th><th>RSI5>70</th></tr>`;
  const maxRet=Math.max(...sectors.map(s=>Math.abs(Number(s.ret20)||0)),1);
  [...sectors].sort((a,b)=>Number(b.ret20)-Number(a.ret20)).forEach(s=>{
    const r=Number(s.ret20)||0;
    const bw=Math.min(Math.abs(r)/maxRet*100,100);
    const bc=r>=0?'var(--green)':'var(--red)';
    html+=`<tr>
      <td><b>${s.sector}</b></td>
      <td class="${signColor(r)}">${sign(r)}${fmt(r)}%</td>
      <td style="width:120px"><div class="bar-wrap"><div class="bar" style="width:${bw}%;background:${bc}"></div></div></td>
      <td><span class="rsi-dot ${rsiDot(Number(s.rsi))}"></span>${fmt(s.rsi,1)}<span style="color:var(--sub);font-size:11px">/${s.rsi10!=null&&s.rsi10!==''?fmt(s.rsi10,1):'—'}</span></td>
      <td>${s.buy}</td><td>${s.hot}</td></tr>`;
  });
  html+=`</table></div>`;

  // 籌碼
  if(chips&&chips.length){
    const buys=chips.filter(c=>Number(c.total)>0).slice(0,5);
    const sells=chips.filter(c=>Number(c.total)<0).slice(-5).reverse();
    html+=`<div class="section-title">籌碼面：三大法人</div><div class="grid-2">`;
    const ct=rows=>`<div class="card" style="overflow-x:auto"><table>
      <tr><th>代碼</th><th>名稱</th><th>族群</th><th>外資</th><th>投信</th><th>自營</th><th>合計</th></tr>
      ${rows.map(c=>`<tr><td>${c.id}</td><td>${c.name}</td><td>${c.sector}</td>
        <td>${chip(c.foreign)}</td><td>${chip(c.trust)}</td><td>${chip(c.dealer)}</td>
        <td><b>${chip(c.total)}</b></td></tr>`).join('')}
      </table></div>`;
    html+=`<div><div style="color:var(--green);font-size:12px;margin-bottom:6px">▲ 買超前 5</div>${ct(buys)}</div>`;
    html+=`<div><div style="color:var(--red);font-size:12px;margin-bottom:6px">▼ 賣超前 5</div>${ct(sells)}</div>`;
    html+=`</div>`;
  }

  // 說明欄
  html+=`
  <details class="info-box">
    <summary>訊號與目標價說明</summary>
    <table>
      <tr><th>訊號</th><th>判斷條件</th><th>操作建議</th></tr>
      <tr><td><span class="badge buy">BUY</span></td><td>RSI5 40–65 且 20日漲幅 > 3%，CV夏普 > 0.5</td><td>可考慮建倉或加碼</td></tr>
      <tr><td><span class="badge hold">HOLD</span></td><td>技術面中性或整理，無明顯買賣訊號</td><td>持有觀望，等待方向確認</td></tr>
      <tr><td><span class="badge sell">SELL</span></td><td>RSI5 > 70 或 20日漲幅 < −5%，CV夏普 < −0.3</td><td>考慮減碼或停損</td></tr>
    </table>
    <div style="margin-top:10px">
      <b>目標價計算方式：</b><br>
      <span class="tp">短期</span> — 近 20 日高點 × 1.03（3% 延伸）<br>
      <span class="tp">中期</span> — 近 60 日高點 × 1.06（6% 延伸）<br>
      <span class="tp">長期</span> — 近 120 日高點 × 1.12（12% 延伸）<br>
      目標價僅供參考，不構成買賣建議。
    </div>
  </details>`;

  // 各族群個股明細
  html+=`<div class="section-title">各族群個股明細</div>`;
  const grouped={};
  stocks.forEach(s=>{(grouped[s.sector]=grouped[s.sector]||[]).push(s);});
  Object.entries(grouped).forEach(([sec,stks])=>{
    const bc=stks.filter(s=>s.signal==='BUY').length;
    html+=`<div class="sector-block">
      <div class="sector-header" onclick="toggle(this)">
        <span><b>${sec}</b>${bc?`<span class="tag" style="color:var(--green)">BUY ${bc}</span>`:''}</span>
        <span style="color:var(--sub);font-size:12px">▼</span>
      </div>
      <div class="sector-body"><table>
        <tr><th>代碼</th><th>名稱</th><th>現價</th><th>RSI5/10</th><th>20日%</th><th>訊號</th><th>CV夏普</th><th>法人合計</th><th>短期目標</th><th>中期目標</th><th>長期目標</th><th></th></tr>
        ${stks.map(s=>`<tr>
          <td>${s.id}</td><td><b>${s.name}</b></td>
          <td>${fmt(s.price,1)}</td>
          <td><span class="rsi-dot ${rsiDot(Number(s.rsi))}"></span>${fmt(s.rsi,1)}<span style="color:var(--sub);font-size:11px">/${s.rsi10!=null&&s.rsi10!==''?fmt(s.rsi10,1):'—'}</span></td>
          <td class="${signColor(Number(s.ret20))}">${s.ret20!==''&&s.ret20!==null&&s.ret20!==undefined?sign(Number(s.ret20))+fmt(s.ret20)+'%':'—'}</td>
          <td>${badge(s.signal)}</td>
          <td>${fmt(s.sharpe,2)}</td>
          <td>${chip(s.chipTotal)}</td>
          <td class="tp">${s.target_short!=null&&s.target_short!==''?fmt(s.target_short,1):'—'}</td>
          <td class="tp">${s.target_mid!=null&&s.target_mid!==''?fmt(s.target_mid,1):'—'}</td>
          <td class="tp">${s.target_long!=null&&s.target_long!==''?fmt(s.target_long,1):'—'}</td>
          <td><button class="btn-add-inline" onclick="wlAdd('${escHtml(s.id)}')" title="加入自選清單">＋</button></td>
        </tr>`).join('')}
      </table></div></div>`;
  });

  document.getElementById('page-daily').innerHTML=html;
}

// ── 主力觀察 ─────────────────────────────────────────────────────────────────
function mfScoreColor(s){
  if(s==null) return 'var(--sub)';
  if(s>=70) return 'var(--green)';
  if(s>=55) return '#5cb85c';
  if(s>=45) return 'var(--yellow)';
  if(s>=30) return '#e67e22';
  return 'var(--red)';
}

function renderMainForce(data){
  const el = document.getElementById('page-mainforce');
  if(!data){
    el.innerHTML = `<div class="error-box"><span>📭</span>尚未載入資料</div>`;
    return;
  }
  const list = data.mainForce || [];
  if(!list.length){
    el.innerHTML = `
    <div class="info-box" style="margin-bottom:16px;">
      <b style="color:var(--text);">🎯 主力觀察（觀察期）</b><br>
      本分頁顯示「ATR(14)×2 動態停損」與「分點主力強度分數」。<br>
      <span style="color:var(--yellow)">⚠ 此日期尚無主力觀察資料 — 待 daily_scan 在啟用後重新跑一次才會出現。</span>
    </div>`;
    return;
  }

  const date = (data.meta && data.meta['掃描日期']) || '—';

  // 統計區
  const scored = list.filter(x=>x.mainForceScore!=null);
  const avgScore = scored.length ? Math.round(scored.reduce((a,b)=>a+b.mainForceScore,0)/scored.length*10)/10 : null;
  const strong = scored.filter(x=>x.mainForceScore>=70).length;
  const weak   = scored.filter(x=>x.mainForceScore<30).length;
  const netBuyTotal = list.reduce((a,b)=>a+(b.brokerNet||0),0);

  let html = `
  <div class="info-box" style="margin-bottom:14px;">
    <b style="color:var(--text);">🎯 主力觀察分頁說明</b><br>
    <b>主力分</b>：依分點 top15 計算 (40% 淨買超 + 35% 前 5 大集中度 + 25% 單一主力主導性) — ≥70 強力吸籌、≥55 偏多、≥45 中性、≥30 偏空、<30 大幅出脫<br>
    <b>停損價</b>：當日收盤 − 2 × ATR(14)，依個股波動動態調整<br>
    <b>主力淨</b>：分點 top15 買超合計減去 top15 賣超合計（張）— 來源：histock.tw
  </div>

  <div class="grid-4">
    <div class="card"><div class="card-title">掃描日期</div><div class="card-value" style="font-size:18px">${fmtDate(date)}</div></div>
    <div class="card"><div class="card-title">主力分平均</div>
      <div class="card-value" style="color:${mfScoreColor(avgScore)}">${avgScore!=null?avgScore.toFixed(1):'—'}</div>
      <div class="card-sub">${scored.length} 檔有資料</div></div>
    <div class="card"><div class="card-title">強力吸籌</div>
      <div class="card-value" style="color:var(--green)">${strong}</div>
      <div class="card-sub">主力分 ≥ 70</div></div>
    <div class="card"><div class="card-title">大幅出脫</div>
      <div class="card-value" style="color:var(--red)">${weak}</div>
      <div class="card-sub">主力分 < 30</div></div>
  </div>

  <div class="section-title">📊 主力強度排行（${list.length} 檔）</div>
  <div class="card" style="overflow-x:auto"><table>
    <tr>
      <th>代碼</th><th>名稱</th><th>族群</th><th>現價</th>
      <th>訊號</th><th>主力分</th><th>標籤</th>
      <th>Top1 買進</th><th>分點淨超</th><th>ATR</th><th>停損價</th><th></th>
    </tr>
    ${list.map((s,i)=>{
      const score = s.mainForceScore;
      const scoreCol = mfScoreColor(score);
      const netClass = (s.brokerNet||0)>=0?'chip-pos':'chip-neg';
      const top1 = s.top1Broker ? `${escHtml(s.top1Broker)} ${s.top1Lots? '+'+s.top1Lots+'張':''}` : '—';
      return `<tr>
        <td><b>${escHtml(s.id)}</b></td>
        <td>${escHtml(s.name)}</td>
        <td><span class="tag">${escHtml(s.sector||'')}</span></td>
        <td>${fmt(s.price,1)}</td>
        <td>${s.signal?badge(s.signal):'—'}</td>
        <td><b style="color:${scoreCol}">${score!=null?fmt(score,1):'—'}</b></td>
        <td style="font-size:12px;color:${scoreCol}">${escHtml(s.mainForceLabel||'—')}</td>
        <td style="font-size:12px">${top1}</td>
        <td class="${netClass}">${s.brokerNet!=null?sign(s.brokerNet)+(s.brokerNet).toLocaleString():'—'}</td>
        <td>${s.atr14!=null?fmt(s.atr14,2):'—'}</td>
        <td class="dn">${s.stopLoss!=null?fmt(s.stopLoss,1):'—'}</td>
        <td><button class="btn-add-inline" onclick="mfToggle(${i})" id="mf-btn-${i}">▼</button></td>
      </tr>
      <tr id="mf-detail-${i}" style="display:none;background:#13161d">
        <td colspan="12" style="padding:12px 16px">${renderMfDetail(s)}</td>
      </tr>`;
    }).join('')}
  </table></div>`;

  el.innerHTML = html;
}

function renderMfDetail(s){
  const buyers = s.topBuyers || [];
  const sellers = s.topSellers || [];
  const err = s.brokerError;
  if(err && !buyers.length && !sellers.length){
    return `<div style="color:var(--sub);font-size:12px">⚠ 分點資料抓取失敗：${escHtml(err)}（${escHtml(s.brokerSource||'unknown')}）</div>`;
  }
  const tb = buyers.map(b=>`<tr>
    <td>${escHtml(b.name)}</td><td>${b.buy}</td><td>${b.sell}</td>
    <td class="chip-pos"><b>+${b.net}</b></td><td>${b.avg_price||'—'}</td>
  </tr>`).join('');
  const ts = sellers.map(s=>`<tr>
    <td>${escHtml(s.name)}</td><td>${s.buy}</td><td>${s.sell}</td>
    <td class="chip-neg"><b>${s.net}</b></td><td>${s.avg_price||'—'}</td>
  </tr>`).join('');
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div>
      <div style="color:var(--green);font-size:12px;margin-bottom:6px">▲ Top 買超分點 (近 5 日)</div>
      <table class="chip-table" style="font-size:12px">
        <tr><th>分點</th><th>買張</th><th>賣張</th><th>淨</th><th>均價</th></tr>
        ${tb||'<tr><td colspan="5" style="color:var(--sub)">無資料</td></tr>'}
      </table>
    </div>
    <div>
      <div style="color:var(--red);font-size:12px;margin-bottom:6px">▼ Top 賣超分點 (近 5 日)</div>
      <table class="chip-table" style="font-size:12px">
        <tr><th>分點</th><th>買張</th><th>賣張</th><th>淨</th><th>均價</th></tr>
        ${ts||'<tr><td colspan="5" style="color:var(--sub)">無資料</td></tr>'}
      </table>
    </div>
  </div>
  <div style="margin-top:8px;font-size:11px;color:var(--sub)">
    來源：${escHtml(s.brokerSource||'—')}
    前 5 大買超合計：${s.top5BuyLots!=null?'+'+s.top5BuyLots+' 張':'—'}
    集中度：${s.concentration!=null?(s.concentration*100).toFixed(1)+'%':'—'}
  </div>`;
}

function mfToggle(i){
  const row = document.getElementById(`mf-detail-${i}`);
  const btn = document.getElementById(`mf-btn-${i}`);
  if(!row) return;
  const open = row.style.display !== 'none';
  row.style.display = open ? 'none' : '';
  if(btn) btn.textContent = open ? '▼' : '▲';
}

// ── 週報 ──────────────────────────────────────────────────────────────────────
function renderWeekly(){
  const el=document.getElementById('page-weekly');
  if(!WEEKLY_DATA){
    el.innerHTML=`<div class="error-box"><span>📭</span>尚無週報資料</div>`;
    return;
  }
  const {meta,changes,buys}=WEEKLY_DATA;
  let html=`
  <div class="grid-4" style="grid-template-columns:repeat(2,1fr)">
    <div class="card"><div class="card-title">週報日期</div><div class="card-value" style="font-size:18px">${meta.date||'—'}</div></div>
    <div class="card"><div class="card-title">涵蓋交易日</div><div class="card-value">${meta.days||'—'} 日</div></div>
  </div>
  <div class="grid-2">`;
  html+=`<div><div class="section-title">族群動能變化</div><div class="card"><table>
    <tr><th>族群</th><th>動能變化 (pp)</th><th></th></tr>`;
  const maxC=Math.max(...changes.map(c=>Math.abs(Number(c.change)||0)),1);
  changes.forEach(c=>{
    const v=Number(c.change)||0;
    const w=Math.min(Math.abs(v)/maxC*100,100);
    const col=v>=0?'var(--green)':'var(--red)';
    html+=`<tr><td>${c.sector}</td>
      <td class="${signColor(v)}">${sign(v)}${fmt(v,2)} pp</td>
      <td style="width:100px"><div class="bar-wrap"><div class="bar" style="width:${w}%;background:${col}"></div></div></td></tr>`;
  });
  html+=`</table></div></div>`;
  html+=`<div><div class="section-title">本週累計 BUY Top 10</div><div class="card"><table>
    <tr><th>排名</th><th>個股</th><th>BUY 次數</th></tr>`;
  buys.forEach((b,i)=>{
    html+=`<tr><td style="color:var(--sub)">${i+1}</td><td>${b.stock}</td>
      <td><span class="badge buy">${b.days} 次</span></td></tr>`;
  });
  html+=`</table></div></div></div>`;
  el.innerHTML=html;
}

// ── 工具 ─────────────────────────────────────────────────────────────────────
function toggle(el){
  const body=el.nextElementSibling;
  body.classList.toggle('open');
  el.querySelector('span:last-child').textContent=body.classList.contains('open')?'▲':'▼';
}

function showError(msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('page-daily').innerHTML=
    `<div class="error-box"><span>📭</span>${msg}</div>`;
  document.getElementById('page-daily').classList.add('active');
}

// ── 啟動 ──────────────────────────────────────────────────────────────────────
init();
</script>

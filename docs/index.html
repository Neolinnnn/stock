<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>台股族群掃描</title>
<style>
  :root {
    --bg:#0b0e14; --card:#161a22; --border:#272c37;
    --text:#e8eaed; --sub:#8b93a3; --green:#2ecc71;
    --red:#e74c3c; --yellow:#f1b143; --blue:#4ea1f3;
    --accent:#3d8bfd; --accent2:#7c5cff;
    --card-hover:#1b2029;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-size:14px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
    -webkit-font-smoothing:antialiased;}

  header{background:rgba(17,21,29,.92);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50;
    border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  header h1{font-size:17px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  nav{display:flex;gap:4px;}
  nav a{color:var(--sub);text-decoration:none;padding:5px 13px;border-radius:8px;font-size:13px;cursor:pointer;transition:.18s;}
  nav a:hover{background:var(--card-hover);color:var(--text);}
  nav a.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
    box-shadow:0 2px 10px rgba(61,139,253,.35);}

  .date-picker{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .date-picker label{font-size:12px;color:var(--sub);}
  .date-picker select{background:#13161d;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;}
  .date-nav{background:#1e2330;border:1px solid var(--border);color:var(--text);border-radius:5px;padding:4px 9px;cursor:pointer;font-size:12px;}
  .date-nav:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  main{padding:20px 24px;max-width:1400px;margin:0 auto;}

  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  @media(max-width:900px){.grid-4{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}}
  @media(max-width:480px){.grid-4{grid-template-columns:1fr 1fr;}}

  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;
    transition:border-color .2s, transform .2s;}
  .card:hover{border-color:#343b49;}
  .card-title{font-size:11px;color:var(--sub);letter-spacing:.5px;margin-bottom:6px;}
  .card-value{font-size:23px;font-weight:700;font-variant-numeric:tabular-nums;}

  /* ── iPhone Safari 直式 ──────────────────────────────── */
  @media(max-width:640px){
    /* Header: h1+date-picker 同排，nav 獨立可橫捲 */
    header{padding:8px 12px;gap:4px;align-items:center;}
    header h1{flex:1;font-size:14px;white-space:nowrap;}
    nav{width:100%;order:3;overflow-x:auto;-webkit-overflow-scrolling:touch;
        scrollbar-width:none;padding-bottom:2px;}
    nav::-webkit-scrollbar{display:none;}
    nav a{white-space:nowrap;font-size:12px;padding:5px 10px;}
    .date-picker{margin-left:0;flex-shrink:0;gap:4px;}
    .date-picker label{display:none;}
    .date-nav{padding:5px 8px;}

    /* 主內容 */
    main{padding:12px 10px;}
    .card{padding:12px 10px;}
    .card-value{font-size:18px;}
    .section-title{font-size:13px;margin:14px 0 8px;}
    .info-box{padding:10px 12px;}

    /* Grid inline style 覆蓋：讓 media query 生效 */
    .grid-4{grid-template-columns:1fr 1fr!important;}

    /* 表格 */
    table{font-size:12px;}
    th,td{padding:5px 6px;}

    /* iOS 慣性橫捲 */
    [style*="overflow-x:auto"]{-webkit-overflow-scrolling:touch;}

    /* 雙條件推薦表：固定第一欄 */
    .qualified-tbl th:first-child,
    .qualified-tbl td:first-child{
      position:sticky;left:0;background:var(--card);z-index:2;
    }
    /* 隱藏次要欄位 */
    .qualified-tbl .col-hide{display:none;}

    /* 個股分析面板：直排 */
    #sp-main{flex-direction:column!important;}
    #sp-right{min-width:0!important;max-width:none!important;width:100%!important;}
    #sp-mini-row{grid-template-columns:1fr!important;}
    #sp-header .sp-price{font-size:24px;}
    #sp-header .sp-chg{font-size:14px;}

    /* 個股搜尋 */
    .stock-search-bar input{width:calc(100% - 80px);}
  }
  .card-sub{font-size:12px;color:var(--sub);margin-top:4px;}

  .section-title{font-size:15px;font-weight:700;margin:22px 0 12px;padding-left:11px;position:relative;}
  .section-title::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:3px;border-radius:2px;
    background:linear-gradient(180deg,var(--accent),var(--accent2));}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#13161d;color:var(--sub);font-weight:500;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;}
  td{padding:7px 10px;border-bottom:1px solid #1e2128;}
  tr:hover td{background:#1e2330;}

  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;}
  .buy{background:rgba(39,174,96,.2);color:var(--green);}
  .sell{background:rgba(231,76,60,.2);color:var(--red);}
  .hold{background:rgba(243,156,18,.15);color:var(--yellow);}

  .bar-wrap{height:16px;background:#13161d;border-radius:4px;overflow:hidden;}
  .bar{height:100%;border-radius:4px;transition:width .4s;}

  .chip-pos{color:var(--green);}.chip-neg{color:var(--red);}

  .sector-block{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;}
  .sector-header{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
  .sector-header:hover{background:#1e2330;border-radius:8px;}
  .sector-body{display:none;padding:0 8px 8px;overflow-x:auto;}
  .sector-body.open{display:block;}

  .tag{background:#1e2330;border-radius:4px;padding:2px 7px;font-size:11px;color:var(--sub);margin-left:6px;}
  .rsi-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;}
  .rsi-hot{background:var(--red);}.rsi-warm{background:var(--yellow);}.rsi-ok{background:var(--green);}
  .up{color:var(--green);}.dn{color:var(--red);}

  .error-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:40px;text-align:center;color:var(--sub);font-size:15px;margin-top:40px;}
  .error-box span{display:block;font-size:36px;margin-bottom:16px;}

  footer{text-align:center;color:var(--sub);font-size:11px;padding:24px;border-top:1px solid var(--border);margin-top:40px;}
  .page-section{display:none;}.page-section.active{display:block;}

  /* 說明欄 */
  .info-box{background:#13161d;border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:12px;color:var(--sub);line-height:1.8;}
  .info-box summary{cursor:pointer;color:var(--blue);font-size:13px;font-weight:600;list-style:none;user-select:none;}
  .info-box summary::before{content:'ℹ️ ';}
  .info-box table{margin-top:10px;border-collapse:collapse;width:100%;}
  .info-box th{color:var(--text);font-weight:600;padding:4px 10px;text-align:left;border-bottom:1px solid var(--border);}
  .info-box td{padding:4px 10px;border-bottom:1px solid #1e2128;}
  .tp{color:#f1c40f;font-weight:600;}

  #loading{text-align:center;padding:60px;color:var(--sub);}
  .wl-add-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
  .wl-add-bar input{background:#13161d;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;width:140px;}
  .wl-add-bar input::placeholder{color:var(--sub);}
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;}
  .btn-primary:hover{opacity:.85;}
  .btn-remove{background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;}
  .btn-remove:hover{border-color:var(--red);color:var(--red);}
  .toast{position:fixed;bottom:24px;right:24px;background:#2d3139;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .btn-add-inline{background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;margin-left:4px;}
  .btn-add-inline:hover{background:var(--accent);color:#fff;}

  /* 產銷組合 Modal */
  .pm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
  .pm-modal{background:var(--card);border:1px solid var(--border);border-radius:14px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;padding:22px 24px;}
  .pm-modal h2{font-size:16px;font-weight:700;margin-bottom:4px;}
  .pm-modal .pm-meta{font-size:11px;color:var(--sub);margin-bottom:16px;}
  .pm-section{margin-bottom:16px;}
  .pm-section h4{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
  .pm-bar-row{margin-bottom:7px;}
  .pm-bar-label{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:3px;}
  .pm-bar-name{color:var(--text);}
  .pm-bar-right{display:flex;gap:8px;align-items:center;}
  .pm-bar-pct{font-weight:600;min-width:36px;text-align:right;}
  .pm-yoy{font-size:10px;padding:1px 5px;border-radius:3px;}
  .pm-yoy.up{background:rgba(39,174,96,.15);color:var(--green);}
  .pm-yoy.dn{background:rgba(231,76,60,.15);color:var(--red);}
  .pm-yoy.flat{background:rgba(136,136,136,.12);color:var(--sub);}
  .pm-track{background:rgba(255,255,255,.07);border-radius:4px;height:9px;overflow:hidden;}
  .pm-fill{height:9px;border-radius:4px;transition:width .4s;}
  .pm-chip-row{display:flex;flex-wrap:wrap;gap:6px;}
  .pm-chip{background:#1e2330;border:1px solid var(--border);border-radius:5px;padding:3px 10px;font-size:12px;color:var(--text);}
  .pm-summary{font-size:12px;color:var(--sub);line-height:1.7;background:#13161d;border-radius:6px;padding:10px 12px;}
  .pm-close{float:right;background:transparent;border:none;color:var(--sub);font-size:18px;cursor:pointer;line-height:1;margin-top:-4px;}
  .pm-close:hover{color:var(--text);}
  .pm-btn{background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:5px;padding:4px 11px;font-size:11px;cursor:pointer;transition:.15s;}
  .pm-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* 個股分析 */
  .stock-search-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
  .stock-search-bar input{background:#13161d;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font-size:14px;width:180px;}
  .stock-search-bar input::placeholder{color:var(--sub);}
  .stock-autocomplete{position:relative;}
  .stock-dropdown{position:absolute;top:100%;left:0;background:var(--card);border:1px solid var(--border);border-radius:6px;z-index:100;min-width:220px;max-height:200px;overflow-y:auto;display:none;}
  .stock-dropdown.show{display:block;}
  .stock-dropdown div{padding:7px 12px;cursor:pointer;font-size:13px;}
  .stock-dropdown div:hover{background:#1e2330;}
  .stock-dropdown .dd-sub{font-size:11px;color:var(--sub);}
  /* 個股面板佈局 */
  #sp-header{padding:10px 0 12px;display:none;}
  #sp-header .sp-name{font-size:20px;font-weight:700;}
  #sp-header .sp-meta{font-size:12px;color:var(--sub);margin-top:2px;}
  #sp-header .sp-price-row{display:flex;align-items:baseline;gap:12px;margin-top:6px;}
  #sp-header .sp-price{font-size:32px;font-weight:700;}
  #sp-header .sp-chg{font-size:16px;font-weight:600;}
  #sp-header .sp-time{font-size:11px;color:var(--sub);margin-left:auto;align-self:flex-end;}
  #sp-main{display:none;gap:10px;align-items:flex-start;}
  #sp-left{flex:7;min-width:0;}
  #sp-right{flex:3;min-width:240px;max-width:320px;display:flex;flex-direction:column;gap:8px;}
  @media(max-width:640px){#sp-right{min-width:0;max-width:none;}}
  #sp-mini-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  #sp-bottom{display:none;gap:10px;flex-wrap:wrap;margin-top:10px;}
  #sp-bottom .card{flex:1;min-width:200px;}
  .sp-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
  .sp-card h3{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .sp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .sp-row:last-child{border-bottom:none;}
  .sp-row .lbl{color:var(--sub);}
  .sp-row .val{font-weight:600;}
  .up{color:var(--green);}.dn{color:var(--red);}.flat{color:var(--sub);}
  #sp-signal-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  #sp-signal-label{font-size:16px;font-weight:700;}
  #sp-signal-desc{font-size:12px;color:var(--sub);margin-top:3px;}
  .prob-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:6px 0;}
  .prob-up{background:var(--green);}.prob-neu{background:var(--blue);}.prob-dn{background:var(--red);}
  .prob-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);}
  .sp-pattern-item{padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .sp-pattern-item:last-child{border-bottom:none;}
  .sp-pattern-item .pt{font-weight:600;} .sp-pattern-item .pd{font-size:11px;color:var(--sub);}
  .chip-table{width:100%;border-collapse:collapse;font-size:12px;}
  .chip-table th{color:var(--sub);text-align:right;padding:3px 6px;font-weight:500;}
  .chip-table th:first-child{text-align:left;}
  .chip-table td{text-align:right;padding:3px 6px;}
  .chip-table td:first-child{text-align:left;color:var(--sub);}
  .chart-box{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;}

  /* ── 指標判斷面板 ─────────────────────────────────────────── */
  .sp-chart-row{display:flex;gap:8px;align-items:flex-start;margin-top:8px;}
  .sp-chart-row .chart-box{flex:3;min-width:0;}
  .sp-judge-panel{flex:1.4;min-width:130px;max-width:195px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.7;display:flex;flex-direction:column;gap:3px;align-self:stretch;}
  .sp-judge-panel h4{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
  .sp-judge-verdict{font-size:13px;font-weight:700;margin-bottom:2px;}
  .sp-judge-detail{color:var(--sub);font-size:11px;}
  .sp-judge-action{margin-top:auto;padding:5px 8px;border-radius:5px;font-size:11px;font-weight:600;line-height:1.5;border:1px solid currentColor;}
  .sp-macd-strip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 14px;margin-top:8px;display:flex;gap:20px;font-size:12px;align-items:flex-start;flex-wrap:wrap;}
  .sp-macd-strip .mst-block{display:flex;flex-direction:column;gap:2px;}
  .sp-macd-strip .mst-label{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;}
  .sp-macd-strip .mst-verdict{font-size:13px;font-weight:700;}
  .sp-macd-strip .mst-detail{font-size:11px;color:var(--sub);}
  .sp-macd-strip .mst-action{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid currentColor;}
  @media(max-width:640px){
    .sp-chart-row{flex-direction:column;align-items:stretch;}
    .sp-chart-row .chart-box{width:100%;}
    .sp-judge-panel{max-width:none;min-width:0;align-self:auto;}
  }

  /* ── 今日行動清單 ──────────────────────────────────────────── */
  .action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;}
  .action-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;
    transition:transform .18s, box-shadow .18s, border-color .18s;}
  .action-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35);border-color:#343b49;}
  .entry-grade{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 9px;
    font-size:11px;font-weight:800;letter-spacing:.3px;}
  .entry-grade.g-A{background:linear-gradient(135deg,rgba(46,204,113,.25),rgba(46,204,113,.08));
    color:var(--green);border:1px solid rgba(46,204,113,.5);}
  .entry-grade.g-B{background:rgba(241,177,67,.14);color:var(--yellow);border:1px solid rgba(241,177,67,.45);}
  .entry-grade.g-C{background:rgba(139,147,163,.12);color:var(--sub);border:1px solid rgba(139,147,163,.3);}
  .entry-evidence{font-size:11px;color:var(--sub);background:rgba(61,139,253,.07);
    border:1px solid rgba(61,139,253,.18);border-radius:6px;padding:5px 9px;margin-bottom:9px;line-height:1.6;}

  /* ── 領頭羊突破卡 ────────────────────────────────────────── */
  .bo-card{background:var(--card);border:1px solid rgba(241,177,67,.4);border-radius:12px;
    padding:13px 16px;transition:transform .18s, box-shadow .18s;}
  .bo-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .bo-stat{display:flex;flex-direction:column;gap:1px;}
  .bo-stat .l{font-size:10px;color:var(--sub);}
  .bo-stat .v{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;}
  .action-card .ac-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap;}
  .action-card .ac-id{font-size:17px;font-weight:700;}
  .action-card .ac-name{font-size:14px;font-weight:600;}
  .action-card .ac-sector{font-size:11px;color:var(--sub);background:#1e2330;border-radius:4px;padding:1px 7px;}
  .action-card .ac-sig{font-size:13px;font-weight:700;margin-left:auto;}
  .action-card .ac-prices{display:flex;gap:12px;font-size:13px;margin-bottom:8px;flex-wrap:wrap;}
  .action-card .ac-price-item{display:flex;flex-direction:column;gap:1px;}
  .action-card .ac-price-lbl{font-size:10px;color:var(--sub);letter-spacing:.3px;}
  .action-card .ac-price-val{font-size:14px;font-weight:700;}
  .action-card .ac-reasons{font-size:11px;color:var(--sub);border-top:1px solid var(--border);padding-top:7px;line-height:1.7;}
  .fund-tab {
    padding: 4px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--sub);
    cursor: pointer;
    font-size: 13px;
  }
  .fund-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── 基本面 KPI 摘要 + 數據表 ───────────────────────────────────── */
  .fund-kpi{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .fund-kpi .kpi{background:#13161d;border:1px solid var(--border);border-radius:8px;
    padding:10px 16px;min-width:110px;flex:1;}
  .fund-kpi .kpi-lbl{font-size:11px;color:var(--sub);letter-spacing:.2px;}
  .fund-kpi .kpi-val{font-size:20px;font-weight:700;margin-top:4px;line-height:1.2;
    font-variant-numeric:tabular-nums;}
  .fund-chart-wrap{margin-bottom:4px;}
  .fund-tbl{width:100%;border-collapse:collapse;font-size:12px;
    font-variant-numeric:tabular-nums;}
  .fund-tbl th{position:sticky;top:0;z-index:1;background:#13161d;color:var(--sub);font-weight:500;
    font-size:11px;text-align:right;padding:7px 10px;border-bottom:1px solid var(--border);}
  .fund-tbl th:first-child{text-align:left;}
  .fund-tbl td{text-align:right;padding:6px 10px;border-bottom:1px solid #20242e;}
  .fund-tbl td:first-child{text-align:left;color:var(--sub);}
  .fund-tbl tr:hover td{background:#181c24;}
  .fund-tbl tr.latest td{background:rgba(31,119,180,.12);}
  .fund-tbl tr.latest td:first-child{color:var(--text);font-weight:600;}

// ── lightweight-charts 管理 ───────────────────────────────────────────────────
let _spCh = {};
let _syncGroup = [];   // 只有「價＋量」互相連動，其餘各圖日期獨立
let _spSync = false;

function _destroySpCharts() {
  Object.values(_spCh).forEach(c => { try { c.remove(); } catch {} });
  _spCh = {};
  _syncGroup = [];
}

function _onRange(src, r) {
  if (_spSync || !r || !_syncGroup.includes(src)) return;
  _spSync = true;
  _syncGroup.forEach(c => {
    if (c !== src) try { c.timeScale().setVisibleLogicalRange(r); } catch {}
  });
  _spSync = false;
}

function _lwc(el, h, showAxis) {
  const c = LightweightCharts.createChart(el, {
    autoSize: true, height: h,
    layout: { background: {type:'solid',color:'#161b22'}, textColor:'#e6edf3', fontSize:11 },
    grid: { vertLines:{visible:false}, horzLines:{color:'#2d3139'} },
    crosshair: { mode: 1 },
    rightPriceScale: { borderColor:'#2d3139', scaleMargins:{top:0.12,bottom:0.08}, minimumWidth:62 },
    timeScale: { borderColor:'#2d3139', visible:!!showAxis, timeVisible:false,
                 secondsVisible:false, fixRightEdge:true, fixLeftEdge:true },
    handleScroll: { mouseWheel:true, pressedMouseMove:true, horzTouchDrag:true, vertTouchDrag:false },
    handleScale: { axisPressedMouseMove:true, mouseWheel:true, pinch:true },
  });
  c.timeScale().subscribeVisibleLogicalRangeChange(r => _onRange(c, r));
  return c;
}

// 十字線移動時於左上角顯示當下數值（無 hover 時顯示最後一筆）
function _legend(chart, el, update) {
  el.style.position = 'relative';
  const lg = document.createElement('div');
  lg.style.cssText = 'position:absolute;left:8px;top:3px;z-index:3;font-size:11px;'
    + 'line-height:1.5;pointer-events:none;white-space:nowrap;font-weight:600;';
  el.appendChild(lg);
  chart.subscribeCrosshairMove(p => { lg.innerHTML = update(p); });
  lg.innerHTML = update(null);
  return lg;
}
function _ld(dates, vals){   // lineData: [{time, value}]，過濾 null
  return dates.map((t,i)=>({time:t, value:vals[i]})).filter(p=>p.value!=null && isFinite(p.value));
}
function _last(arr){ for(let i=arr.length-1;i>=0;i--) if(arr[i]!=null&&isFinite(arr[i])) return arr[i]; return null; }
function _at(p, series, vals){
  if(p && p.seriesData){ const d=p.seriesData.get(series); if(d!=null) return d.value!=null?d.value:d; }
  return _last(vals);
}
const _f1 = v => v==null?'—':v.toFixed(1);
const _f2 = v => v==null?'—':v.toFixed(2);
const _fInt = v => v==null?'—':Math.round(v).toLocaleString();

let _toastTimer = null;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.classList.remove('show'); _toastTimer = null; }, 3000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function loadWatchlist(silent=false) {

function renderWatchlist(data) {

        <td class="${signColor(Number(s.ret20))}">${s.ret20!==''&&s.ret20!==null ? sign(Number(s.ret20))+fmt(s.ret20)+'%' : '—'}</td>

async function wlAdd(idOverride) {
  if (!APPS_SCRIPT_URL) { showToast('請先設定 APPS_SCRIPT_URL'); return; }
  const id = (idOverride || document.getElementById('wl-input')?.value || '').trim().toUpperCase();

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',

      body: JSON.stringify({ action: 'add', id }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`✓ ${id} ${data.name} 已加入自選清單`);
      if (document.getElementById('wl-input')) document.getElementById('wl-input').value = '';
      loadWatchlist(true);
    } else {
      const msgs = { duplicate:'已在清單中', limit_reached:'自選清單已達 50 檔上限', not_found:'代碼無效，請確認股票代碼' };
      showToast(msgs[data.error] || `新增失敗：${data.error}`);
    }
  } catch { showToast('新增失敗，請重試'); }
  if (msg) msg.textContent = '';
}

async function wlRemove(id) {
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',

      body: JSON.stringify({ action: 'remove', id }),

    const data = await res.json();
    if (data.ok) { showToast(`${id} 已從自選清單移除`); loadWatchlist(true); }

// ── 輔助函式 ──────────────────────────────────────────────────────────────────
function fmt(v,d=1){return v===''||v===null||v===undefined?'—':(typeof v==='number'?v.toFixed(d):v);}
function sign(v){return v>0?'+':'';}
function signColor(v){return v>0?'up':'dn';}
function rsiDot(r){return r>70?'rsi-hot':r>60?'rsi-warm':'rsi-ok';}
function badge(s){const m={BUY:'buy',SELL:'sell',HOLD:'hold'};return `<span class="badge ${m[s]||'hold'}">${s}</span>`;}
function chip(v){if(v===''||v===null||v===undefined)return '—';const n=Number(v);return `<span class="${n>=0?'chip-pos':'chip-neg'}">${sign(n)}${n.toLocaleString()}</span>`;}
function fmtDate(d){return d?`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`:d;}

async function fetchJSON(url){
  const r = await fetch(url, {cache:'no-cache'});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function loadBtResults(){
  try{
    BT_RESULTS = await fetchJSON('./backtest/results.json?v=' + Math.floor(Date.now()/86400000));
    BT_MAP = buildBtMap(BT_RESULTS);
  }catch(e){
    console.warn('backtest/results.json 載入失敗：', e.message);
  }
}

function buildBtMap(results){
  const map = new Map();
  if(!results || !results.ranking || !results.variants) return map;
  const top5ids = results.ranking.slice(0,5).map(r=>r.id);
  top5ids.forEach(id=>{
    const variant = results.variants.find(v=>v.id===id);
    if(!variant || !variant.rebalances || !variant.rebalances.length) return;
    const lastRb = variant.rebalances[variant.rebalances.length-1];
    if(!lastRb.holdings) return;
    lastRb.holdings.forEach(h=>{
      if(!map.has(h.stock_id)){
        map.set(h.stock_id, {count:0, strategies:[], name:h.name, sector:h.sector});
      }
      const entry = map.get(h.stock_id);
      entry.count++;
      entry.strategies.push({id:variant.id, label:variant.label, sharpe:results.ranking.find(r=>r.id===id)?.sharpe||0});
    });
  });
  return map;
}

let _dmDate = null, _dmCache = null;
function buildDailyMap(){
  if(_dmDate === CUR_DATE && _dmCache) return _dmCache;
  const d = CACHE[CUR_DATE];
  const m = new Map();
  if(!d || !d.stocks) return m;
  d.stocks.forEach(s=> m.set(s.id, s));
  if(d.mainForce) d.mainForce.forEach(s=>{ if(m.has(s.id)) m.get(s.id).stopLoss = s.stopLoss; });
  _dmDate = CUR_DATE; _dmCache = m;
  return m;
}

function computeTodayPicks(variantId, data){
  if(!data || !data.sectors || !data.stocks) return [];
  const parts = variantId.split('_');
  const sectorRule = parts[0];
  const stockRule  = parts[parts.length - 1];
  const SECTORS_N = 3, STOCKS_N = 3;

  let ranked;
  if(sectorRule === 'composite'){
    const get = f => data.sectors.map(s => s[f] || 0);
    const norm = arr => {
      const mn = Math.min(...arr), mx = Math.max(...arr);
      return arr.map(v => mx > mn ? (v - mn) / (mx - mn) : 0);
    };
    const nR = norm(get('ret20')), nH = norm(get('hot')), nB = norm(get('buy'));
    ranked = data.sectors.map((s, i) => ({
      ...s, _score: 0.5 * nR[i] + 0.3 * nH[i] + 0.2 * nB[i]
    })).sort((a, b) => b._score - a._score);
  } else {
    ranked = [...data.sectors].sort((a, b) => (b.ret20 || 0) - (a.ret20 || 0));
  }

  const topSectors = ranked.slice(0, SECTORS_N).map(s => s.sector);
  const picks = [];
  topSectors.forEach(sector => {
    const inSec = data.stocks.filter(s => s.sector === sector);
    const sorted = stockRule === 'chip'
      ? [...inSec].sort((a, b) => (b.chipTotal || 0) - (a.chipTotal || 0))
      : [...inSec].sort((a, b) => (b.ret20    || 0) - (a.ret20    || 0));
    sorted.slice(0, STOCKS_N).forEach(s => picks.push(s));
  });
  return picks;
}

function showBtTooltip(sid, event){

  document.getElementById('bt-tt-strat-names').textContent = bt.strategies.map(s=>s.label).join('、');

  const tt = document.getElementById('bt-tooltip');
  tt.classList.add('show');

  const margin = 12;
  const touch = event.touches?.[0] ?? event.changedTouches?.[0];
  const cx = touch ? touch.clientX : event.clientX;
  const cy = touch ? touch.clientY : event.clientY;
  let x = cx + margin;
  let y = cy + margin;
  tt.style.left = '0'; tt.style.top = '0';
  const w = tt.offsetWidth, h = tt.offsetHeight;
  const vw = window.innerWidth, vh = window.innerHeight;
  if(x + w > vw - margin) x = cx - w - margin;
  if(y + h > vh - margin) y = cy - h - margin;
  tt.style.left = Math.max(margin, x) + 'px';
  tt.style.top  = Math.max(margin, y) + 'px';
}

function hideBtTooltip(){

// ── 雙維選股（族群動能 × 籌碼）：原「回測選股」分頁，已整合進今日掃描 ─────────
function buildDualPickHtml(data){
  if(!data || !data.sectors || !data.stocks) return '';

  // 取前3強勢族群（20日漲幅排名）
  const topSectors = [...data.sectors]
    .sort((a,b) => Number(b.ret20||0) - Number(a.ret20||0))
    .slice(0, 3).map(s => s.sector);

  // 動能篩選：強勢族群 × 個股20日漲幅前3
  const momentumPicks = [];
  topSectors.forEach(sec => {
    const inSec = data.stocks.filter(s => s.sector === sec && s.signal !== 'SELL');
    [...inSec].sort((a,b) => Number(b.ret20||0) - Number(a.ret20||0))
      .slice(0, 3).forEach(s => momentumPicks.push({...s, _basis:'momentum'}));
  });

  // 籌碼篩選：強勢族群 × 法人合計買超前3
  const chipPicks = [];
  topSectors.forEach(sec => {
    const inSec = data.stocks.filter(s => s.sector === sec && s.signal !== 'SELL' && Number(s.chipTotal||0) > 0);
    [...inSec].sort((a,b) => Number(b.chipTotal||0) - Number(a.chipTotal||0))
      .slice(0, 3).forEach(s => chipPicks.push({...s, _basis:'chip'}));
  });

  // 交集：同時出現在兩個清單的股票
  const momentumIds = new Set(momentumPicks.map(s=>s.id));
  const chipIds     = new Set(chipPicks.map(s=>s.id));
  const intersectIds = new Set([...momentumIds].filter(id => chipIds.has(id)));

  const stockRow = (s, showBadge) => {
    const ret = Number(s.ret20||0);
    const chipN = Number(s.chipTotal||0);
    return `<tr>
      <td><b>${escHtml(s.id)}</b></td>
      <td>${escHtml(s.name)}${showBadge&&intersectIds.has(s.id)?`<span class="bt-badge">★雙選</span>`:''}</td>
      <td><span class="tag">${escHtml(s.sector)}</span></td>
      <td class="${ret>=0?'up':'dn'}">${ret>=0?'+':''}${fmt(s.ret20,1)}%</td>
      <td class="${chipN>=0?'chip-pos':'chip-neg'}">${chipN>=0?'+':''}${chipN.toLocaleString()}</td>
      <td><span class="rsi-dot ${rsiDot(Number(s.rsi||0))}"></span>${fmt(s.rsi,1)}</td>
      <td>${s.signal?badge(s.signal):'—'}</td>
    </tr>`;
  };

  let html = `<div class="section-title">🎯 雙維選股（族群動能 × 法人籌碼）</div>`;

  // 交集精選（最強訊號，直接顯示）
  if(intersectIds.size){
    const intersectStocks = [...intersectIds].map(id => data.stocks.find(s=>s.id===id)).filter(Boolean);
    html += `<div class="card" style="overflow-x:auto;margin-bottom:12px;border-left:3px solid var(--yellow)">
    <div style="font-size:12px;font-weight:700;color:var(--yellow);padding:2px 6px 8px;">⭐ 雙選精選 — 動能與籌碼同時入選，信號最強</div>
    <table>
      <tr><th>代碼</th><th>名稱</th><th>族群</th><th>20日%</th><th>法人合計</th><th>RSI5</th><th>訊號</th></tr>
      ${intersectStocks.map(s=>stockRow(s,false)).join('')}
    </table></div>`;
  }

  // 散點象限圖（純 CSS 百分比定位，零繪圖庫、手機原生觸控）：
  // x=20日動能、y=法人籌碼，右上=雙強區
  html += `<div class="card" style="margin-bottom:12px;">
    <div style="font-size:11px;color:var(--sub);margin-bottom:6px;">
      每一點是一檔追蹤股：<b style="color:var(--green)">右上象限＝動能與籌碼雙強</b>；
      <span style="color:var(--yellow)">◆黃＝雙選</span>、
      <span style="color:var(--green)">●綠＝動能入選</span>、
      <span style="color:var(--blue)">●藍＝籌碼入選</span>、灰＝其餘（點任一點看個股分析）
    </div>
    ${_dualPickScatterHtml(data.stocks, momentumIds, chipIds, intersectIds)}
  </div>`;

  // 完整兩欄收進 details，保持頁面乾淨
  html += `<details class="card" style="margin-bottom:20px;padding:12px 16px;">
    <summary style="cursor:pointer;font-size:13px;font-weight:600;color:var(--blue);user-select:none;">
      📋 完整篩選明細（強勢族群 ${escHtml(topSectors.join('、'))} ｜ 動能前3 × 籌碼前3）
    </summary>
    <div style="font-size:11px;color:var(--sub);margin:8px 0 10px;line-height:1.7;">
      <b>動能篩選</b>：個股近20日漲幅最高 — 跟上強勢族群的衝刺股；
      <b>籌碼篩選</b>：三大法人合計買超最多 — 主力正在佈局的股票；
      <b style="color:var(--yellow)">★雙選</b>＝兩者同時入選。賣出訊號(SELL)已排除。
    </div>
    <div class="grid-2" style="margin-bottom:0;">
      <div style="overflow-x:auto">
        <div style="font-size:12px;font-weight:600;margin-bottom:6px;">📈 動能篩選</div>
        <table>
          <tr><th>代碼</th><th>名稱</th><th>族群</th><th>20日%</th><th>法人合計</th><th>RSI5</th><th>訊號</th></tr>
          ${momentumPicks.map(s=>stockRow(s,true)).join('')}
        </table>
      </div>
      <div style="overflow-x:auto">
        <div style="font-size:12px;font-weight:600;margin-bottom:6px;">🏦 籌碼篩選</div>
        <table>
          <tr><th>代碼</th><th>名稱</th><th>族群</th><th>20日%</th><th>法人合計</th><th>RSI5</th><th>訊號</th></tr>
          ${chipPicks.length ? chipPicks.map(s=>stockRow(s,true)).join('') :
            `<tr><td colspan="7" style="color:var(--sub);padding:12px">今日強勢族群中無法人買超個股</td></tr>`}
        </table>
      </div>
    </div>
  </details>`;

  return html;
}

function stockSuggest(q){
  const dd = document.getElementById('stock-dd');
  if(!q || q.length < 1){ dd.classList.remove('show'); return; }
  const hits = STOCKS_INDEX.filter(s=>s.id.startsWith(q)||s.name.includes(q)).slice(0,8);
  if(!hits.length){ dd.classList.remove('show'); return; }
  dd.innerHTML = hits.map(s=>`
    <div onclick="document.getElementById('stock-input').value='${s.id}';document.getElementById('stock-dd').classList.remove('show');loadStock('${s.id}')">
      <b>${s.id}</b> ${s.name} <span class="dd-sub">${s.sector}</span>
    </div>`).join('');
  dd.classList.add('show');
}

async function loadStock(sid){
  if(!sid) return;
  document.getElementById('stock-dd').classList.remove('show');
  const st = document.getElementById('sp-status');
  st.textContent = '載入中…';
  ['sp-main','sp-bottom'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('sp-header').innerHTML='';
  ['fund-revenue','fund-eps','fund-margins'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.innerHTML='<div style="color:var(--sub);font-size:13px;padding:8px;">載入中…</div>';
  });

  const bust = Math.floor(Date.now()/86400000);
  let data;
  try{ data = await fetchJSON(`./stocks/${sid}.json?v=${bust}`); }
  catch{
    st.textContent = `⚠ 找不到 ${sid} 的資料`;
    return;
  }
  st.textContent = `已載入 ${data.name}（${data.stock_id||data.id}）· ${data.generated_at||''}`;
  spRender(data);
}

function spRender(d){

  const hEl = document.getElementById('sp-header');

  const cs = d.quote?.change ?? 0;

  hEl.innerHTML = `
    <div style="padding:10px 0 12px;">
      <div style="font-size:20px;font-weight:700;">${d.name}（${d.stock_id||d.id}）</div>

        <span class="${cls}" style="font-size:16px;font-weight:600;">${cp!=null?`${sgn}${cs?.toFixed(2)} (${sgn}${cp?.toFixed(2)}%)`:'—'}</span>

  spRenderIndicatorJudges(d);
  spRenderSignal(d.signal);
  spRenderSummary(d.summary);
  spRenderChipSummary(d.chip);
  spRenderPrediction(d.prediction, d.summary);
  spRenderPatterns(d.patterns);
  spRenderLevels(d.levels);
  spRenderSuggestion(d);
  loadFundamentals(d.stock_id);
}

// ── 基本面 ──────────────────────────────────────────────────────────────────
let _fundData = null;
let _fundLoaded = false;

function switchFundTab(tab, btn) {
  document.querySelectorAll('.fund-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['revenue', 'eps', 'margins', 'product_mix'].forEach(t => {
    const el = document.getElementById('fund-' + t.replace('_','-'));
    if (el) el.style.display = t === tab ? '' : 'none';
  });
  if (_fundLoaded && _fundData) {
    if (tab === 'eps')         renderFundEps(_fundData);
    if (tab === 'margins')     renderFundMargins(_fundData);
    if (tab === 'product_mix') renderFundProductMix(_fundData);
  }
}

function loadFundamentals(stockId) {
  _fundData = null;
  _fundLoaded = false;
  // Reset tabs back to 月營收
  document.querySelectorAll('.fund-tab').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });
  ['revenue', 'eps', 'margins', 'product-mix'].forEach((t, i) => {
    const el = document.getElementById('fund-' + t);
    if (el) {
      el.style.display = i === 0 ? '' : 'none';
      if (i === 0) el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">載入中…</div>';
      else el.innerHTML = '';
    }
  });
  fetchJSON(`./fundamentals/${stockId}.json`)
    .then(d => { _fundData = d; _fundLoaded = true; renderFundRevenue(d); })
    .catch(() => {
      ['revenue','eps','margins','product-mix'].forEach(t => {
        const el = document.getElementById('fund-' + t);
        if (el) el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">— 無基本面資料</div>';
      });
    });
}

function renderFundEps(d) {
  const el = document.getElementById('fund-eps');
  if (!d || !d.eps) {
    el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">— 無 EPS 資料</div>';
    return;
  }
  const e = d.eps;
  const signColor = v => v == null ? 'var(--sub)' : v >= 0 ? 'var(--green)' : 'var(--red)';
  const fmtPct = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
  const latestEps = e.eps[e.eps.length - 1];
  const latestYoy = e.yoy[e.yoy.length - 1];

  let html = `<div class="fund-kpi">
    <div class="kpi"><div class="kpi-lbl">最新季 EPS</div><div class="kpi-val">${latestEps != null ? latestEps.toFixed(2) + ' 元' : '—'}</div></div>
    <div class="kpi"><div class="kpi-lbl">YoY</div><div class="kpi-val" style="color:${signColor(latestYoy)}">${fmtPct(latestYoy)}</div></div>
  </div>`;

  html += `<div class="fund-chart-wrap"><div id="fund-eps-chart" style="height:300px;"></div>
    <div style="font-size:10px;color:var(--sub);margin-top:3px;">柱＝季 EPS（綠正紅負）　<span style="color:#f0b429">━ 去年同季</span>（柱高於線＝年增）</div></div>`;

  html += `<div class="fund-tbl-wrap"><table class="fund-tbl"><thead><tr>
    <th>季度</th><th>EPS（元）</th><th>QoQ</th><th>YoY</th></tr></thead><tbody>`;
  for (let i = e.quarter.length - 1; i >= 0; i--) {
    html += `<tr class="${i === e.quarter.length - 1 ? 'latest' : ''}">
      <td>${e.quarter[i]}</td>
      <td style="color:${signColor(e.eps[i])}">${e.eps[i] != null ? e.eps[i].toFixed(2) : '—'}</td>
      <td style="color:${signColor(e.qoq[i])}">${fmtPct(e.qoq[i])}</td>
      <td style="color:${signColor(e.yoy[i])}">${fmtPct(e.yoy[i])}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  el.innerHTML = html;

  // lightweight-charts：柱 = 季 EPS（正綠負紅），黃線 = 去年同季 → 差距即年增
  const QEND = { '1': '03-31', '2': '06-30', '3': '09-30', '4': '12-31' };
  const qTime = q => { const [y, qq] = q.split('Q'); return `${y}-${QEND[qq]}`; };
  const chEl = document.getElementById('fund-eps-chart');
  const c = _lwc(chEl, chEl.offsetHeight || 300, true);
  const times = e.quarter.map(qTime);
  const lag4 = e.eps.map((_, i) => i >= 4 ? e.eps[i - 4] : null);
  const bar = c.addHistogramSeries({ priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
    priceLineVisible: false, lastValueVisible: false });
  bar.setData(times.map((t, i) => e.eps[i] == null ? null : {
    time: t, value: e.eps[i],
    color: e.eps[i] >= 0 ? 'rgba(38,166,65,.8)' : 'rgba(248,81,73,.8)',
  }).filter(Boolean));
  const lag = c.addLineSeries({ color: '#f0b429', lineWidth: 2,
    priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
    priceLineVisible: false, lastValueVisible: false });
  lag.setData(_ld(times, lag4));
  const idxMap = {}; times.forEach((t, i) => { idxMap[t] = i; });
  const tKey = t => `${t.year}-${String(t.month).padStart(2,'0')}-${String(t.day).padStart(2,'0')}`;
  _legend(c, chEl, p => {
    let i = e.eps.length - 1;
    if (p && p.time) { const k = idxMap[tKey(p.time)]; if (k != null) i = k; }
    const yy = e.yoy[i], yc = yy == null ? 'var(--sub)' : yy >= 0 ? '#26a641' : '#f85149';
    return `${e.quarter[i]} EPS <span style="color:#e6edf3">${_f2(e.eps[i])} 元</span>`
      + `　<span style="color:${yc}">YoY ${yy != null ? (yy >= 0 ? '+' : '') + yy.toFixed(1) + '%' : '—'}</span>`
      + `　<span style="color:#f0b429">去年同季 ${_f2(lag4[i])}</span>`;
  });
  c.timeScale().fitContent();
}

function renderFundMargins(d) {
  const el = document.getElementById('fund-margins');
  if (!d || !d.margins) {
    el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">— 無三率資料</div>';
    return;
  }
  const m = d.margins;
  const fmtPct = v => v == null ? '—' : v.toFixed(1) + '%';
  const latestGross = m.gross_margin[m.gross_margin.length - 1];
  const latestOp    = m.operating_margin[m.operating_margin.length - 1];
  const latestNet   = m.net_margin[m.net_margin.length - 1];

  let html = `<div class="fund-kpi">
    <div class="kpi"><div class="kpi-lbl">毛利率</div><div class="kpi-val">${fmtPct(latestGross)}</div></div>
    <div class="kpi"><div class="kpi-lbl">營益率</div><div class="kpi-val">${fmtPct(latestOp)}</div></div>
    <div class="kpi"><div class="kpi-lbl">淨利率</div><div class="kpi-val">${fmtPct(latestNet)}</div></div>
  </div>`;

  html += `<div class="fund-chart-wrap"><div id="fund-margins-chart" style="height:300px;"></div></div>`;

  html += `<div class="fund-tbl-wrap"><table class="fund-tbl"><thead><tr>
    <th>季度</th><th>毛利率</th><th>營益率</th><th>淨利率</th></tr></thead><tbody>`;
  for (let i = m.quarter.length - 1; i >= 0; i--) {
    html += `<tr class="${i === m.quarter.length - 1 ? 'latest' : ''}">
      <td>${m.quarter[i]}</td>
      <td>${fmtPct(m.gross_margin[i])}</td>
      <td>${fmtPct(m.operating_margin[i])}</td>
      <td>${fmtPct(m.net_margin[i])}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  el.innerHTML = html;

  // lightweight-charts：三率折線（綠=毛利、紫=營益、藍=淨利）
  const QEND2 = { '1': '03-31', '2': '06-30', '3': '09-30', '4': '12-31' };
  const times = m.quarter.map(q => { const [y, qq] = q.split('Q'); return `${y}-${QEND2[qq]}`; });
  const chEl = document.getElementById('fund-margins-chart');
  const c = _lwc(chEl, chEl.offsetHeight || 300, true);
  const pf = { type: 'price', precision: 1, minMove: 0.1 };
  const mk = (vals, color, w, style) => {
    const s = c.addLineSeries({ color, lineWidth: w, lineStyle: style || 0, priceFormat: pf,
      priceLineVisible: false, lastValueVisible: true });
    s.setData(_ld(times, vals));
    return s;
  };
  mk(m.gross_margin, '#26a641', 2.5);
  mk(m.operating_margin, '#bc8cff', 2.5);
  mk(m.net_margin, '#58a6ff', 2, 1);
  const idxMap = {}; times.forEach((t, i) => { idxMap[t] = i; });
  const tKey = t => `${t.year}-${String(t.month).padStart(2,'0')}-${String(t.day).padStart(2,'0')}`;
  _legend(c, chEl, p => {
    let i = m.quarter.length - 1;
    if (p && p.time) { const k = idxMap[tKey(p.time)]; if (k != null) i = k; }
    return `${m.quarter[i]}　<span style="color:#26a641">毛利 ${_f1(m.gross_margin[i])}%</span>`
      + `　<span style="color:#bc8cff">營益 ${_f1(m.operating_margin[i])}%</span>`
      + `　<span style="color:#58a6ff">淨利 ${_f1(m.net_margin[i])}%</span>`;
  });
  c.timeScale().fitContent();
}

// ── 產銷組合 共用渲染 ──────────────────────────────────────────────────────────
const _PM_COLORS = ['#4e9af1','#50c878','#9b59b6','#f39c12','#e74c3c','#1abc9c','#e67e22'];

function _renderPMHtml(pm) {
  if (!pm || !pm.product_lines) return '<div style="color:var(--sub);padding:12px">— 尚無產銷組合資料</div>';
  const lines   = pm.product_lines || [];
  const regions = pm.regions       || [];
  const maxPct  = Math.max(...lines.map(l => l.share_pct || 0), 1);

  let h = '';

  // 產品線
  if (lines.length) {
    h += `<div class="pm-section"><h4>產品線佔比</h4>`;
    lines.forEach((l, i) => {
      const pct    = l.share_pct ?? 0;
      const yoy    = l.yoy_growth;
      const trend  = l.trend || 'flat';
      const color  = _PM_COLORS[i % _PM_COLORS.length];
      const fillW  = Math.round((pct / maxPct) * 100);
      const yoyCls = trend === 'up' ? 'up' : trend === 'down' ? 'dn' : 'flat';
      const yoyTxt = yoy != null ? (yoy >= 0 ? `▲ +${yoy}%` : `▼ ${yoy}%`) : '';
      h += `<div class="pm-bar-row">
        <div class="pm-bar-label">
          <span class="pm-bar-name">${escHtml(l.name)}</span>
          <span class="pm-bar-right">
            ${yoyTxt ? `<span class="pm-yoy ${yoyCls}">${yoyTxt}</span>` : ''}
            <span class="pm-bar-pct" style="color:${color}">${pct}%</span>
          </span>
        </div>
        <div class="pm-track"><div class="pm-fill" style="width:${fillW}%;background:${color}"></div></div>
      </div>`;
    });
    h += `</div>`;
  }

  // 地區分布
  if (regions.length) {
    h += `<div class="pm-section"><h4>地區分布</h4>`;
    regions.forEach((r, i) => {
      const pct   = r.share_pct ?? 0;
      const color = _PM_COLORS[i % _PM_COLORS.length];
      h += `<div class="pm-bar-row">
        <div class="pm-bar-label">
          <span class="pm-bar-name">${escHtml(r.name)}</span>
          <span class="pm-bar-pct" style="color:${color}">${pct}%</span>
        </div>
        <div class="pm-track"><div class="pm-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    });
    h += `</div>`;
  }

  // 主要客戶
  const customers = pm.customers || [];
  if (customers.length) {
    h += `<div class="pm-section"><h4>主要客戶</h4><div class="pm-chip-row">`;
    customers.forEach(c => { h += `<span class="pm-chip">${escHtml(c)}</span>`; });
    h += `</div></div>`;
  }

  // 商業模式 & 競爭優勢
  const rows = [['商業模式', pm.biz_model], ['核心優勢', pm.moat]].filter(r => r[1]);
  if (rows.length) {
    h += `<div class="pm-section"><h4>商業模式 & 競爭優勢</h4>`;
    rows.forEach(([label, val]) => {
      h += `<div style="font-size:12px;margin-bottom:5px"><span style="color:var(--sub)">${label}：</span>${escHtml(val)}</div>`;
    });
    h += `</div>`;
  }

  // 摘要
  if (pm.summary) {
    h += `<div class="pm-section"><h4>業務摘要</h4><div class="pm-summary">${escHtml(pm.summary)}</div></div>`;
  }

  return h;
}

// 個股分析 — 產銷 tab

// 今日行動清單 — 開啟 modal
function openPM(sid, name) {
  const pm = (window._PM_CACHE || {})[sid];
  const title = document.getElementById('pm-title');
  const meta  = document.getElementById('pm-meta');
  const body  = document.getElementById('pm-body');
  title.textContent = `${name}（${sid}）產銷組合`;
  meta.textContent  = pm ? `資料期間：${pm.data_period || '—'}　更新：${pm.updated_at || '—'}` : '';
  body.innerHTML    = _renderPMHtml(pm);
  document.getElementById('pm-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closePM() {
  document.getElementById('pm-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function renderFundRevenue(d) {
  const el = document.getElementById('fund-revenue');
  if (!d || !d.revenue) {
    el.innerHTML = '<div style="color:var(--sub);font-size:13px;padding:8px;">— 無月營收資料</div>';
    return;
  }
  const r = d.revenue;
  const latest = r.revenue[r.revenue.length - 1];
  const latestYoy = r.yoy[r.yoy.length - 1];
  const latestMom = r.mom[r.mom.length - 1];
  const latestCumYoy = r.cum_yoy[r.cum_yoy.length - 1];

  const signColor = v => v == null ? 'var(--sub)' : v >= 0 ? 'var(--green)' : 'var(--red)';
  const fmtPct = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
  const fmtRev = v => v == null ? '—' : (v / 1e8).toFixed(1) + ' 億';

  let html = `<div class="fund-kpi">
    <div class="kpi"><div class="kpi-lbl">最新月營收</div><div class="kpi-val">${fmtRev(latest)}</div></div>
    <div class="kpi"><div class="kpi-lbl">YoY</div><div class="kpi-val" style="color:${signColor(latestYoy)}">${fmtPct(latestYoy)}</div></div>
    <div class="kpi"><div class="kpi-lbl">MoM</div><div class="kpi-val" style="color:${signColor(latestMom)}">${fmtPct(latestMom)}</div></div>
    <div class="kpi"><div class="kpi-lbl">累計 YoY</div><div class="kpi-val" style="color:${signColor(latestCumYoy)}">${fmtPct(latestCumYoy)}</div></div>
  </div>`;

  html += `<div class="fund-chart-wrap"><div id="fund-rev-chart" style="height:300px;"></div>
    <div style="font-size:10px;color:var(--sub);margin-top:3px;">柱＝月營收（綠：年增／紅：年減）　<span style="color:#f0b429">━ 去年同月</span>（柱高於線＝優於去年）</div></div>`;

  html += `<div class="fund-tbl-wrap"><table class="fund-tbl"><thead><tr>
    <th>月份</th><th>月營收</th><th>MoM</th><th>YoY</th><th>累計YoY</th></tr></thead><tbody>`;
  const showN = Math.min(r.month.length, 24);
  for (let i = r.month.length - 1; i >= r.month.length - showN; i--) {
    html += `<tr class="${i === r.month.length - 1 ? 'latest' : ''}">
      <td>${r.month[i]}</td>
      <td>${fmtRev(r.revenue[i])}</td>
      <td style="color:${signColor(r.mom[i])}">${fmtPct(r.mom[i])}</td>
      <td style="color:${signColor(r.yoy[i])}">${fmtPct(r.yoy[i])}</td>
      <td style="color:${signColor(r.cum_yoy ? r.cum_yoy[i] : null)}">${fmtPct(r.cum_yoy ? r.cum_yoy[i] : null)}</td>
    </tr>`;
  }
  html += '</tbody></table></div>';
  el.innerHTML = html;

  // lightweight-charts（與技術線圖同引擎，手機觸控友善）：
  // 柱 = 月營收（YoY>0 綠 / <0 紅），黃線 = 去年同月營收 → 柱與線的差距即年增
  const chEl = document.getElementById('fund-rev-chart');
  const c = _lwc(chEl, chEl.offsetHeight || 300, true);
  const times = r.month.map(m => `${m.slice(0,4)}-${m.slice(4,6)}-01`);
  const revB = r.revenue.map(v => v != null ? +(v / 1e8).toFixed(2) : null);
  const lagB = revB.map((_, i) => i >= 12 ? revB[i - 12] : null);
  const bar = c.addHistogramSeries({ priceFormat: { type: 'price', precision: 1, minMove: 0.1 },
    priceLineVisible: false, lastValueVisible: false });
  bar.setData(times.map((t, i) => revB[i] == null ? null : {
    time: t, value: revB[i],
    color: r.yoy[i] == null ? '#5a6478' : r.yoy[i] >= 0 ? 'rgba(38,166,65,.8)' : 'rgba(248,81,73,.8)',
  }).filter(Boolean));
  const lag = c.addLineSeries({ color: '#f0b429', lineWidth: 2,
    priceFormat: { type: 'price', precision: 1, minMove: 0.1 },
    priceLineVisible: false, lastValueVisible: false });
  lag.setData(_ld(times, lagB));
  const mKey = t => `${t.year}-${String(t.month).padStart(2,'0')}`;
  const idxMap = {}; times.forEach((t, i) => { idxMap[t.slice(0, 7)] = i; });
  _legend(c, chEl, p => {
    let i = revB.length - 1;
    if (p && p.time) { const k = idxMap[mKey(p.time)]; if (k != null) i = k; }
    const yy = r.yoy[i], yc = yy == null ? 'var(--sub)' : yy >= 0 ? '#26a641' : '#f85149';
    return `${r.month[i].slice(0,4)}/${r.month[i].slice(4,6)} 營收 <span style="color:#e6edf3">${_f1(revB[i])} 億</span>`
      + `　<span style="color:${yc}">YoY ${yy != null ? (yy >= 0 ? '+' : '') + yy.toFixed(1) + '%' : '—'}</span>`
      + `　<span style="color:#f0b429">去年同月 ${_f1(lagB[i])}</span>`;
  });
  c.timeScale().fitContent();
}

const _PLY = {
  bg:'#161b22', plot:'#161b22', font:{color:'#e6edf3',size:11},
  grid:'#30363d', up:'#26a641', dn:'#f85149', neu:'#58a6ff', acc:'#bc8cff',
};
function spRenderMainChart(d) {
  const wrap = document.getElementById('sp-main-chart');
  wrap.innerHTML =
    '<div id="_lwc-k"></div>' +
    '<div id="_lwc-v" style="margin-top:1px"></div>' +
    '<div id="_lwc-m" style="margin-top:6px"></div>';

  const dates = d.ohlcv.date, I = d.indicators;

  // ── K線 + BB + MA（上方主圖，無日期軸；與成交量共用底部日期）
  const kC = _lwc(document.getElementById('_lwc-k'), 300);
  _spCh.candle = kC;
  const candle = kC.addCandlestickSeries({
    upColor:'#26a641', downColor:'#f85149',
    borderUpColor:'#26a641', borderDownColor:'#f85149',
    wickUpColor:'#26a641', wickDownColor:'#f85149',
    priceFormat:{type:'price', precision:1, minMove:0.1},
  });
  candle.setData(dates.map((t,i) => ({
    time:t, open:d.ohlcv.open[i], high:d.ohlcv.high[i],
    low:d.ohlcv.low[i], close:d.ohlcv.close[i],
  })));
  const maRefs = [];
  [['ma5','MA5','#f0b429'],['ma20','MA20','#58a6ff'],['ma60','MA60','#bc8cff']].forEach(([k,lbl,clr]) => {
    if (!I[k]) return;
    const s = kC.addLineSeries({color:clr,lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    s.setData(_ld(dates, I[k]));
    maRefs.push({series:s, label:lbl, color:clr, vals:I[k]});
  });
  if (I.bb_upper) {
    const bbO = {color:'rgba(255,165,0,0.5)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false};
    kC.addLineSeries(bbO).setData(_ld(dates, I.bb_upper));
    kC.addLineSeries(bbO).setData(_ld(dates, I.bb_lower));
    if (I.bb_mid) kC.addLineSeries({...bbO,color:'rgba(255,165,0,0.25)',lineStyle:0}).setData(_ld(dates, I.bb_mid));
  }
  if (d.mj_signals && d.mj_signals.length) {
    candle.setMarkers(
      [...d.mj_signals].sort((a,b)=>a.date<b.date?-1:1).map(s => ({
        time: s.date,
        position: s.signal==='LONG' ? 'belowBar' : 'aboveBar',
        shape: s.signal==='LONG' ? 'arrowUp' : 'arrowDown',
        color: s.signal==='LONG' ? '#26a641' : '#f85149',
        text: s.signal==='LONG' ? '▲MJ' : '▼MJ',
        size: 1,
      }))
    );
  }
  _legend(kC, document.getElementById('_lwc-k'), p => {
    const bar = p && p.seriesData ? p.seriesData.get(candle) : null;
    let o,h,l,c;
    if (bar && bar.open!=null){ o=bar.open; h=bar.high; l=bar.low; c=bar.close; }
    else { o=_last(d.ohlcv.open); h=_last(d.ohlcv.high); l=_last(d.ohlcv.low); c=_last(d.ohlcv.close); }
    const cl = (c>=o) ? '#26a641' : '#f85149';
    const ohlc = `<span style="color:${cl}">開 ${_f1(o)}　高 ${_f1(h)}　低 ${_f1(l)}　收 ${_f1(c)}</span>`;
    const mas = maRefs.map(m=>`<span style="color:${m.color}">${m.label} ${_f1(_at(p,m.series,m.vals))}</span>`).join('　');
    return ohlc + (mas ? '<br>'+mas : '');
  });

  // ── 成交量（價量組共用日期軸，與 K線連動）
  const vC = _lwc(document.getElementById('_lwc-v'), 80, true);
  _spCh.vol = vC;
  const vol = vC.addHistogramSeries({priceFormat:{type:'volume'}, priceLineVisible:false, lastValueVisible:false});
  vol.priceScale().applyOptions({scaleMargins:{top:0.18,bottom:0}});
  vol.setData(dates.map((t,i) => ({
    time:t, value:d.ohlcv.volume[i],
    color: d.ohlcv.close[i] >= d.ohlcv.open[i] ? '#26a641' : '#f85149',
  })));
  _legend(vC, document.getElementById('_lwc-v'), p => {
    const v = _at(p, vol, d.ohlcv.volume);
    return `<span style="color:var(--sub)">量 </span><span style="color:#e6edf3">${v==null?'—':(v/1000).toLocaleString(undefined,{maximumFractionDigits:0})} 張</span>`;
  });

  // 價＋量 連動
  _syncGroup = [kC, vC];

  // 預設顯示最後 42 根（約 2 個月）
  const _initRange = {from: Math.max(0, dates.length - 42), to: dates.length - 1};
  kC.timeScale().setVisibleLogicalRange(_initRange);
  vC.timeScale().setVisibleLogicalRange(_initRange);

  // ── MACD（獨立日期軸，不與價量連動）
  const mC = _lwc(document.getElementById('_lwc-m'), 110, true);
  _spCh.macd = mC;
  let macdHist=null, macdDif=null, macdSig=null;
  if (I.macd_hist) {
    macdHist = mC.addHistogramSeries({priceFormat:{type:'price',precision:2,minMove:0.01}, priceLineVisible:false, lastValueVisible:false});
    macdHist.setData(dates.map((t,i) => ({
      time:t, value:I.macd_hist[i],
      color:(I.macd_hist[i]??0)>=0 ? '#26a641' : '#f85149',
    })).filter(p=>p.value!=null&&isFinite(p.value)));
  }
  if (I.macd) {
    macdDif = mC.addLineSeries({color:'#f85149',lineWidth:1,priceFormat:{type:'price',precision:2,minMove:0.01},priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    macdDif.setData(_ld(dates, I.macd));
  }
  if (I.macd_signal) {
    macdSig = mC.addLineSeries({color:'#58a6ff',lineWidth:1,priceFormat:{type:'price',precision:2,minMove:0.01},priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    macdSig.setData(_ld(dates, I.macd_signal));
  }
  _legend(mC, document.getElementById('_lwc-m'), p => [
    macdDif  && `<span style="color:#f85149">DIF ${_f2(_at(p,macdDif,I.macd))}</span>`,
    macdSig  && `<span style="color:#58a6ff">DEA ${_f2(_at(p,macdSig,I.macd_signal))}</span>`,
    macdHist && `<span style="color:var(--sub)">OSC ${_f2(_at(p,macdHist,I.macd_hist))}</span>`,
  ].filter(Boolean).join('　'));
}

function spRenderKDChart(d) {
  const el = document.getElementById('sp-kd-chart');
  el.innerHTML = '';
  const dates = d.ohlcv.date, I = d.indicators;

  const kC = _lwc(el, 180, true);   // 獨立日期軸
  _spCh.kd = kC;

  // 參考線（80 / 20 / 0）
  const refL = (v, clr) => kC.addLineSeries({color:clr,lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false})
    .setData(dates.map(t=>({time:t, value:v})));
  refL(80, 'rgba(231,76,60,0.5)');
  refL(20, 'rgba(39,174,96,0.5)');
  if (I.kd_j) refL(0, 'rgba(255,255,255,0.2)');

  const pf = {type:'price',precision:1,minMove:0.1};
  let sK,sD,sJ;
  if (I.kd_k){ sK=kC.addLineSeries({color:'#f0b429',lineWidth:1.5,priceFormat:pf,priceLineVisible:false,lastValueVisible:false}); sK.setData(_ld(dates,I.kd_k)); }
  if (I.kd_d){ sD=kC.addLineSeries({color:'#58a6ff',lineWidth:1.5,priceFormat:pf,priceLineVisible:false,lastValueVisible:false}); sD.setData(_ld(dates,I.kd_d)); }
  if (I.kd_j){ sJ=kC.addLineSeries({color:'#ff6b6b',lineWidth:1,lineStyle:1,priceFormat:pf,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false}); sJ.setData(_ld(dates,I.kd_j)); }
  kC.priceScale('right').applyOptions({scaleMargins:{top:0.12,bottom:0.05}});
  _legend(kC, el, p => [
    sK && `<span style="color:#f0b429">K ${_f1(_at(p,sK,I.kd_k))}</span>`,
    sD && `<span style="color:#58a6ff">D ${_f1(_at(p,sD,I.kd_d))}</span>`,
    sJ && `<span style="color:#ff6b6b">J ${_f1(_at(p,sJ,I.kd_j))}</span>`,
  ].filter(Boolean).join('　'));
}

function spRenderChipChart(d) {
  const el = document.getElementById('sp-chip-chart');
  const chip = d.chip;
  if (!chip || !chip.dates || !chip.dates.length) {
    el.innerHTML = '<div style="color:var(--sub);font-size:12px;padding:12px;">無法人籌碼資料</div>';
    return;
  }
  el.innerHTML = '';
  const cC = _lwc(el, 180, true);   // 獨立日期軸
  _spCh.chip = cC;
  const pf = {type:'price',precision:0,minMove:1};

  // 合計柱狀（紅/綠）
  let sTot;
  if (chip.total) {
    sTot = cC.addHistogramSeries({priceFormat:pf, priceLineVisible:false, lastValueVisible:false});
    sTot.setData(chip.dates.map((t,i)=>({
      time:t, value:chip.total[i]??0,
      color:(chip.total[i]??0)>=0?'#26a641':'#f85149',
    })));
  }
  // 三大法人折線
  const refs = [];
  [['foreign','外資','#58a6ff'],['trust','投信','#26a641'],['dealer','自營','#bc8cff']].forEach(([k,lbl,clr])=>{
    if (!chip[k]) return;
    const s = cC.addLineSeries({color:clr,lineWidth:1,priceFormat:pf,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    s.setData(chip.dates.map((t,i)=>({time:t,value:chip[k][i]})).filter(p=>p.value!=null));
    refs.push({series:s, label:lbl, color:clr, vals:chip[k]});
  });
  _legend(cC, el, p => {
    const tot = sTot ? `<span style="color:var(--sub)">合計 </span><span style="color:#e6edf3">${_fInt(_at(p,sTot,chip.total))}</span>` : '';
    const lines = refs.map(r=>`<span style="color:${r.color}">${r.label} ${_fInt(_at(p,r.series,r.vals))}</span>`).join('　');
    return tot + (lines ? '　'+lines : '');
  });
}

// ── 行動清單：KDJ / MACD 判斷（從 trend_analysis 欄位） ─────────────────────
function _kdFromTA(ta){
  // Returns {state, color, detail} using kd_k/d/j and prev values in trend_analysis
  const k=ta.kd_k, d=ta.kd_d, j=ta.kd_j, kp=ta.kd_k_prev, dp=ta.kd_d_prev;
  if(k==null) return null;
  const crossUp=kp!=null&&dp!=null&&kp<=dp&&k>d;
  const crossDn=kp!=null&&dp!=null&&kp>=dp&&k<d;
  let state,color,detail;
  if(k<20||(j!=null&&j<5)){
    state='超賣底部'; color='var(--green)';
    detail=`J=${j!=null?j.toFixed(0):'—'}，可留意反彈`;
  }else if(k>80||(j!=null&&j>100)){
    state='超買頂部'; color='var(--red)';
    detail=`J=${j!=null?j.toFixed(0):'—'}，謹慎追高`;
  }else if(crossUp){
    state='黃金交叉'; color='var(--green)';
    detail=`K${k.toFixed(0)}上穿D${d.toFixed(0)}，買進訊號`;
  }else if(crossDn){
    state='死亡交叉'; color='var(--red)';
    detail=`K${k.toFixed(0)}下穿D${d.toFixed(0)}，等訊號止穩`;
  }else if(k>d&&k>50){
    state='多頭區'; color='var(--green)';
    detail=`K${k.toFixed(0)}>D${d.toFixed(0)}，趨勢偏多`;
  }else if(k<d&&k<50){
    state='空頭區'; color='var(--red)';
    detail=`K${k.toFixed(0)}<D${d.toFixed(0)}，趨勢偏弱`;
  }else{
    state='震盪中'; color='var(--sub)';
    detail=`K${k.toFixed(0)}/D${d.toFixed(0)}，方向待確認`;
  }
  return{state,color,detail};
}

function _macdFromTA(ta){
  const dif=ta.macd_dif, dea=ta.macd_dea, bar=ta.macd_bar, barP=ta.macd_bar_prev;
  if(dif==null) return null;
  const difUp=dif>dea;
  const expanding=barP!=null?Math.abs(bar)>Math.abs(barP):null;
  let state,color,detail;
  if(dif>0&&difUp&&expanding!==false){
    state='多頭擴張'; color='var(--green)';
    detail=`DIF>DEA，動能${expanding?'增強':'持穩'}`;
  }else if(dif>0&&difUp&&expanding===false){
    state='多頭收斂'; color='var(--yellow)';
    detail='上漲動能在減弱';
  }else if(dif>0&&!difUp){
    state='多頭死叉'; color='var(--yellow)';
    detail='DIF跌破DEA，留意';
  }else if(dif<0&&!difUp&&expanding){
    state='空頭加速'; color='var(--red)';
    detail='下跌動能擴大';
  }else if(dif<0&&!difUp){
    state='空頭'; color='var(--red)';
    detail='DIF<DEA，趨勢偏空';
  }else{
    state='整理'; color='var(--sub)';
    detail='DIF/DEA 差距微小';
  }
  return{state,color,detail};
}

function _actionDecision(sig, kdj, macd){
  // Returns {text, color}综合决策提示
  const bullKDJ = kdj&&(kdj.state==='黃金交叉'||kdj.state==='多頭區'||kdj.state==='超賣底部');
  const bearKDJ = kdj&&(kdj.state==='死亡交叉'||kdj.state==='空頭區');
  const overboughtKDJ = kdj&&kdj.state==='超買頂部';
  const bullMACD = macd&&(macd.state==='多頭擴張');
  const weakMACD = macd&&(macd.state==='多頭收斂'||macd.state==='多頭死叉');
  const bearMACD = macd&&(macd.state==='空頭'||macd.state==='空頭加速');
  const buySignal = sig==='強力買入'||sig==='買入';

  if(buySignal&&bullKDJ&&bullMACD)
    return{text:'✅ 三層共振，最佳進場時機',color:'var(--green)'};
  if(buySignal&&(kdj&&kdj.state==='超賣底部')&&!bearMACD)
    return{text:'⏰ 超賣反彈，可試單留意停損',color:'var(--green)'};
  if(buySignal&&bullKDJ&&weakMACD)
    return{text:'⚡ 可進場，但 MACD 動能減弱留意',color:'var(--yellow)'};
  if(buySignal&&bearKDJ&&bearMACD)
    return{text:'⏳ 雙重空頭訊號，等 KDJ 止穩再進',color:'var(--red)'};
  if(buySignal&&bearKDJ&&!bearMACD)
    return{text:'⚠ KDJ 偏空，建議等 K 線翻多再進',color:'var(--yellow)'};
  if(buySignal&&overboughtKDJ)
    return{text:'⚠ 超買區，等回調再進，不追高',color:'var(--yellow)'};
  if(buySignal)
    return{text:'📊 行動清單推薦，確認時機再進',color:'var(--sub)'};
  return{text:'觀望等待更明確訊號',color:'var(--sub)'};
}

// ── 指標判斷邏輯 ─────────────────────────────────────────────────────────────
function _buildKDJudge(I){
  if(!I||!I.kd_k) return null;
  const k=I.kd_k.slice(-1)[0], d=I.kd_d?.slice(-1)[0], j=I.kd_j?.slice(-1)[0];
  const kp=I.kd_k.slice(-2)[0], dp=I.kd_d?.slice(-2)[0];
  const crossUp=kp!=null&&dp!=null&&kp<=dp&&k>d;
  const crossDn=kp!=null&&dp!=null&&kp>=dp&&k<d;
  let state,color,details=[],action;
  if(k<20&&(j==null||j<10)){
    state='超賣底部';color='var(--green)';
    details=[`K ${k?.toFixed(1)} 進入超賣區`,'J 值觸底，反彈機率高'];
    action='可小量試單，等 KD 黃金交叉確認';
  }else if(k>80&&(j==null||j>90)){
    state='超買頂部';color='var(--red)';
    details=[`K ${k?.toFixed(1)} 進入超買區`,'J 值接近頂部，回調風險高'];
    action='謹慎追高，可逢高減碼';
  }else if(crossUp){
    state='KD 黃金交叉';color='var(--green)';
    details=[`K(${k?.toFixed(1)}) 上穿 D(${d?.toFixed(1)})`,'買進訊號成立'];
    action='積極訊號，可考慮進場';
  }else if(crossDn){
    state='KD 死亡交叉';color='var(--red)';
    details=[`K(${k?.toFixed(1)}) 下穿 D(${d?.toFixed(1)})`,'賣出訊號成立'];
    action='注意風險，考慮減碼';
  }else if(k>d&&k>50){
    state='多頭強勢';color='var(--green)';
    details=[`K(${k?.toFixed(1)}) > D(${d?.toFixed(1)})，多頭格局`];
    action='趨勢偏多，可持倉或等回調加碼';
  }else if(k<d&&k<50){
    state='空頭弱勢';color='var(--red)';
    details=[`K(${k?.toFixed(1)}) < D(${d?.toFixed(1)})，空頭格局`];
    action='趨勢偏空，暫不進場';
  }else{
    state='震盪整理';color='var(--sub)';
    details=[`K ${k?.toFixed(1)} / D ${d?.toFixed(1)} 方向未明`];
    action='等待方向確認，保持觀望';
  }
  return{state,color,details,action};
}

function _buildMACDJudge(I){
  if(!I||!I.macd) return null;
  const dif=I.macd.slice(-1)[0], dea=I.macd_signal?.slice(-1)[0];
  const hist=I.macd_hist?.slice(-1)[0], histP=I.macd_hist?.slice(-2)[0];
  const difAboveDea=dif>dea, expanding=hist!=null&&histP!=null&&Math.abs(hist)>Math.abs(histP);
  let state,color,details=[],action;
  if(dif>0&&difAboveDea&&expanding){
    state='多頭擴張';color='var(--green)';
    details=['DIF>DEA，紅柱走寬','上漲動能持續增強'];
    action='趨勢向上，適合持倉';
  }else if(dif>0&&difAboveDea&&!expanding){
    state='多頭收斂';color='var(--yellow)';
    details=['DIF>DEA，但紅柱縮短','上漲動能減弱中'];
    action='注意是否到頂，可逢高減倉';
  }else if(dif>0&&!difAboveDea){
    state='多頭死叉';color='var(--yellow)';
    details=['DIF>0 但跌破 DEA','多頭出現疲態'];
    action='警戒，確認 DIF 能否再翻回 DEA 以上';
  }else if(dif<0&&!difAboveDea&&!expanding){
    state='空頭衰退';color='var(--red)';
    details=['DIF<0，綠柱縮短','跌勢動能減弱'];
    action='觀察是否準備反彈，暫不進場';
  }else if(dif<0&&!difAboveDea&&expanding){
    state='空頭加速';color='var(--red)';
    details=['DIF<DEA，綠柱擴大','下跌動能增強'];
    action='空頭趨勢強，嚴禁進場';
  }else{
    state='整理待變';color='var(--sub)';
    details=['DIF 與 DEA 差距微小'];
    action='等待 MACD 方向確認';
  }
  return{state,color,details,action,dif,dea};
}

function _buildChipJudge(chip){
  if(!chip||!chip.dates||!chip.dates.length) return null;
  const sumN=(arr,n)=>arr?.slice(-n).filter(v=>v!=null).reduce((a,b)=>a+b,0)||0;
  const f5=sumN(chip.foreign,5), t5=sumN(chip.trust,5), d5=sumN(chip.dealer,5);
  const total10=sumN(chip.total,10);
  const mainBuy=f5>0&&t5>0, mainSell=f5<0&&t5<0;
  let state,color,details=[],action;
  if(mainBuy&&total10>0){
    state='外資投信同步買進';color='var(--green)';
    details=[`外資 5日 +${f5.toFixed(0)}張`,`投信 5日 +${t5.toFixed(0)}張`,'主力齊買，籌碼堅實'];
    action='籌碼面支持，持倉信心高';
  }else if(mainSell){
    state='外資投信同步賣出';color='var(--red)';
    details=[`外資 5日 ${f5.toFixed(0)}張`,`投信 5日 ${t5.toFixed(0)}張`,'主力出脫，需謹慎'];
    action='籌碼面轉空，考慮減碼';
  }else if(total10>0){
    state='法人合計買超';color='var(--green)';
    details=[`10日合計 +${total10.toFixed(0)}張`,'整體偏買'];
    action='略偏多，配合技術面操作';
  }else if(total10<0){
    state='法人合計賣超';color='var(--yellow)';
    details=[`10日合計 ${total10.toFixed(0)}張`,'整體偏賣'];
    action='籌碼略鬆，注意風險';
  }else{
    state='法人中性';color='var(--sub)';
    details=['近期法人買賣相抵'];
    action='籌碼面中性，依技術面判斷';
  }
  return{state,color,details,action};
}

  if(!el) return;

function setPage(page){
  CUR_PAGE = page;
  ['daily','weekly','mainforce','stock','watchlist','lab'].forEach(p=>{
    const navEl = document.getElementById(`nav-${p}`);
    if(navEl) navEl.classList.toggle('active', p===page);
    const pageEl = document.getElementById(`page-${p}`);
    if(pageEl) pageEl.classList.toggle('active', p===page);
  });
  // 主力觀察與今日掃描共用同一份 daily payload，所以也需要日期選擇器
  document.getElementById('date-picker-wrap').style.display =
    (page==='daily' || page==='mainforce') ? '' : 'none';
  if(page==='weekly')    renderWeekly();
  if(page==='watchlist') loadWatchlist();
  if(page==='stock')     initStockPage();
  if(page==='mainforce') renderMainForce(CACHE[CUR_DATE]);
  if(page==='lab')       renderLabPage();
  hideBtTooltip();
}

// ── 日期導航 ──────────────────────────────────────────────────────────────────
async function loadDate(dateStr){
  CUR_DATE = dateStr;
  document.getElementById('date-select').value = dateStr;
  document.getElementById('btn-prev').disabled = DATES.indexOf(dateStr) >= DATES.length-1;
  document.getElementById('btn-next').disabled = DATES.indexOf(dateStr) <= 0;

  if(!CACHE[dateStr]){
    const bust = Math.floor(Date.now()/86400000); // 每天換一次
    try{
      CACHE[dateStr] = await fetchJSON(`./${dateStr}.json?v=${bust}`);
    }catch{
      try{
        CACHE[dateStr] = await fetchJSON(`./daily.json?v=${bust}`);
      }catch{
        showError(`無法載入 ${fmtDate(dateStr)} 的資料`);
        return;
      }
    }
  }
  renderDaily(CACHE[dateStr]);
  if(CUR_PAGE==='mainforce') renderMainForce(CACHE[dateStr]);
  document.getElementById('loading').style.display='none';
}

function stepDate(dir){
  const idx = DATES.indexOf(CUR_DATE);
  const next = idx - dir;  // DATES 降冪，-1=往前=更小 index
  if(next>=0 && next<DATES.length) loadDate(DATES[next]);
}

// HYBRID 策略卡片：進場閘門 BUY / 出場訊號 / 持有中（回測勝率63%、avg+8.6%、PF2.83）
function hybridCard(p){
  if(!p) return '';
  const bull = p.taiexBull;
  const bullBadge = `<span style="font-size:12px;padding:2px 9px;border-radius:6px;font-weight:600;`
    + (bull?`background:rgba(38,166,91,.15);color:var(--green)`:`background:rgba(232,72,72,.15);color:var(--red)`)
    + `">大盤${bull?'多頭':'空頭'} ${p.taiexClose?('· '+Number(p.taiexClose).toLocaleString()+' / MA60 '+Number(p.taiexMa60).toLocaleString()):''}</span>`;
  const gate = p.gateBuys||[], exits = p.newExits||[], hold = p.holding||[];
  const pill = (txt,color)=>`<span style="display:inline-block;font-size:11px;padding:1px 7px;border-radius:5px;background:${color};color:#fff;margin-left:6px;">${txt}</span>`;
  let body = '';
  // 進場閘門 BUY
  body += `<div style="margin-top:10px;"><b style="color:var(--green);font-size:13px;">🟢 進場閘門 BUY</b>${pill(gate.length,'#26a65b')}<span style="font-size:11px;color:var(--sub);margin-left:8px;">大盤多頭 + 個股多頭排列(收&gt;MA5&gt;MA20&gt;MA60)</span>`;
  if(gate.length){
    body += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">` +
      gate.map(g=>`<span style="font-size:12px;background:#1e2330;border:1px solid var(--border);border-radius:6px;padding:3px 9px;">${escHtml(g.id)} ${escHtml(g.name)} <span style="color:var(--sub)">${g.price??''}</span></span>`).join('') + `</div>`;
  } else { body += `<span style="font-size:12px;color:var(--sub);margin-left:8px;">無</span>`; }
  body += `</div>`;
  // 出場訊號
  if(exits.length){
    body += `<div style="margin-top:12px;"><b style="color:var(--red);font-size:13px;">🔴 出場訊號</b>${pill(exits.length,'#e84848')}<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">` +
      exits.map(e=>{const c=Number(e.returnPct)>=0?'var(--green)':'var(--red)';
        return `<span style="font-size:12px;background:#1e2330;border:1px solid var(--border);border-radius:6px;padding:3px 9px;">${escHtml(e.id)} ${escHtml(e.name)} <b style="color:${c}">${sign(Number(e.returnPct))}${Number(e.returnPct).toFixed(1)}%</b> <span style="color:var(--sub)">(${escHtml(e.reason||'')})</span></span>`;}).join('') + `</div></div>`;
  }
  // 持有中
  if(hold.length){
    body += `<div style="margin-top:12px;"><b style="color:var(--blue);font-size:13px;">📌 持有中</b>${pill(hold.length,'#3a7bd5')}<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">` +
      hold.map(h=>{const p2=Number(h.phase)===2;
        return `<span style="font-size:12px;background:#1e2330;border:1px solid var(--border);border-radius:6px;padding:3px 9px;">${escHtml(h.id)} ${escHtml(h.name)} <span style="color:var(--sub)">進${h.entryPrice??''}</span> ${p2?'<span style="color:var(--green)">Phase2·抱MA10</span>':'<span style="color:var(--sub)">Phase1</span>'}</span>`;}).join('') + `</div></div>`;
  }
  return `<div class="card" style="margin-bottom:16px;border-left:3px solid var(--accent);padding:12px 16px;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <b style="font-size:14px;">⚡ HYBRID 策略訊號</b>${bullBadge}
      <span style="font-size:11px;color:var(--sub);">回測勝率63% · avg+8.6% · PF2.83</span>
    </div>${body}</div>`;
}

function renderDaily(data){

  const otcIdx   = meta['櫃買指數'];
  const otcChg   = meta['櫃買漲跌幅%'];
  const strong   = meta['強勢族群']||'無';
  const weak     = meta['弱勢族群']||'無';
  const coverage = meta['掃描涵蓋率']??100;
  const failedSectors  = meta['失敗族群']||[];
  const partialSectors = meta['部分失敗族群']||{};

  const top5Strong = [...sectors].sort((a,b)=>Number(b.ret20)-Number(a.ret20)).slice(0,5).map(s=>s.sector).join('、');
  const top2Weak   = [...sectors].sort((a,b)=>Number(a.ret20)-Number(b.ret20)).slice(0,2).map(s=>s.sector).join('、');

  </div>
  ${hybridCard(positions)}
  ${coverage<100?`<div class="card" style="margin-bottom:8px;border-left:3px solid var(--yellow);padding:8px 14px">
    <span style="color:var(--yellow);font-weight:bold">⚠ 掃描涵蓋率 ${coverage}%</span>

    ${Object.keys(partialSectors).length?`<span style="color:var(--sub);font-size:12px;margin-left:8px">部分失敗：${escHtml(Object.entries(partialSectors).map(([k,v])=>k+'('+v+'檔)').join('、'))}</span>`:''}
    <div style="font-size:11px;color:var(--sub);margin-top:2px">以上族群當日 API 失敗，推薦結果可能不完整</div>
  </div>`:''}
  <details class="info-box" style="margin-bottom:16px;">
    <summary>雙篩選邏輯說明</summary>
    <div style="margin-top:10px;line-height:2;">三層條件依序過濾，通過才列入推薦，並以第三層加權評分輸出買入建議：</div>
    <table>
      <tr><th>篩選層</th><th>條件</th><th>用意</th></tr>

        <td><b style="color:var(--blue);">第一篩｜族群面</b></td>
        <td>族群 20日漲幅排名前段 且 RSI5 &gt; 60（族群輪動強勢）</td>
        <td>只選處於資金輪動期的強勢族群，避免逆勢操作</td>

        <td><b style="color:var(--green);">第二篩｜個股面</b></td>
        <td>RSI5 介於 40–65（未過熱）且 20日漲幅 &gt; 3% 且 CV 夏普 &gt; 0.5</td>
        <td>個股技術健康、尚未超漲，風報比佳（訊號為 BUY）</td>

  if(qualified&&qualified.length){
    // ── 今日行動清單 ──────────────────────────────────────────────

      html+=`<div class="action-card" style="border-left-color:${borderColor}">

// ── 雙維選股散點象限圖（純 CSS 百分比定位，免繪圖庫、自適應手機寬度） ───────
function _dualPickScatterHtml(stocks, momentumIds, chipIds, intersectIds){
  const pts=(stocks||[]).filter(s=>s.ret20!=null&&s.ret20!=='');
  if(!pts.length) return '<div style="color:var(--sub);font-size:12px;padding:20px;">無資料</div>';
  const xs=pts.map(s=>Number(s.ret20)), ys=pts.map(s=>Number(s.chipTotal||0)/1000);
  const xMax=Math.max(...xs.map(Math.abs),5)*1.15, yMax=Math.max(...ys.map(Math.abs),1)*1.15;
  const px=v=>((v+xMax)/(2*xMax)*100).toFixed(2);     // x → left%
  const py=v=>((v+yMax)/(2*yMax)*100).toFixed(2);     // y → bottom%
  const grp=s=>intersectIds.has(s.id)?'dual':momentumIds.has(s.id)?'mom':chipIds.has(s.id)?'chip':'rest';
  const STYLE={
    rest:{c:'#5a6478',sz:7,z:1,op:.5,lbl:false},
    chip:{c:'#4ea1f3',sz:11,z:2,op:.95,lbl:true},
    mom: {c:'#2ecc71',sz:11,z:2,op:.95,lbl:true},
    dual:{c:'#f1b143',sz:14,z:3,op:1,lbl:true},
  };
  let dots='';
  pts.forEach(s=>{
    const g=grp(s), st=STYLE[g];
    const x=Number(s.ret20), y=Number(s.chipTotal||0)/1000;
    const diamond=g==='dual'?'border-radius:2px;transform:translate(-50%,50%) rotate(45deg);border:2px solid #fff;':'border-radius:50%;transform:translate(-50%,50%);';
    dots+=`<div onclick="goToStock('${escHtml(s.id)}')" title="${escHtml(s.id+' '+s.name)}｜20日 ${x.toFixed(1)}%｜法人 ${Math.round(y).toLocaleString()} 千張"
      style="position:absolute;left:${px(x)}%;bottom:${py(y)}%;width:${st.sz}px;height:${st.sz}px;${diamond}
        background:${st.c};opacity:${st.op};z-index:${st.z};cursor:pointer;"></div>`;
    if(st.lbl) dots+=`<div onclick="goToStock('${escHtml(s.id)}')"
      style="position:absolute;left:${px(x)}%;bottom:${py(y)}%;transform:translate(-50%,calc(50% - ${st.sz/2+3}px));
        font-size:9px;color:${st.c};font-weight:700;white-space:nowrap;z-index:${st.z};cursor:pointer;">${escHtml(s.name)}</div>`;
  });
  const xT=Math.round(xMax/1.15), yT=Math.round(yMax/1.15);
  return `<div style="position:relative;height:340px;background:#161b22;border:1px solid var(--border);border-radius:8px;overflow:hidden;">
    <!-- 雙強區底色 -->
    <div style="position:absolute;left:50%;bottom:50%;width:50%;height:50%;background:rgba(46,204,113,.05);"></div>
    <div style="position:absolute;right:6px;top:6px;font-size:11px;color:rgba(46,204,113,.65);font-weight:600;">雙強區</div>
    <!-- 零軸 -->
    <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:#2d3340;"></div>
    <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#2d3340;"></div>
    <!-- 刻度 -->
    <div style="position:absolute;left:2%;bottom:50%;font-size:9px;color:var(--sub);transform:translateY(50%);">-${xT}%</div>
    <div style="position:absolute;right:2%;bottom:50%;font-size:9px;color:var(--sub);transform:translateY(50%);">+${xT}%</div>
    <div style="position:absolute;left:50%;top:2%;font-size:9px;color:var(--sub);transform:translateX(4px);">+${yT.toLocaleString()} 千張</div>
    <div style="position:absolute;left:50%;bottom:2%;font-size:9px;color:var(--sub);transform:translateX(4px);">-${yT.toLocaleString()} 千張</div>
    <!-- 軸標題 -->
    <div style="position:absolute;right:6px;bottom:50%;font-size:10px;color:var(--sub);transform:translateY(calc(50% + 14px));">20日報酬 →</div>
    <div style="position:absolute;left:6px;top:6px;font-size:10px;color:var(--sub);">法人買賣超 ↑</div>
    ${dots}
  </div>`;
}

// ── 主力觀察 ─────────────────────────────────────────────────────────────────
function mfScoreColor(s){
  if(s==null) return 'var(--sub)';
  if(s>=70) return 'var(--green)';
  if(s>=55) return '#5cb85c';
  if(s>=45) return 'var(--yellow)';
  if(s>=30) return '#e67e22';
  return 'var(--red)';
}

function renderMainForce(data){
  const el = document.getElementById('page-mainforce');
  if(!data){
    el.innerHTML = `<div class="error-box"><span>📭</span>尚未載入資料</div>`;
    return;
  }
  const list = data.mainForce || [];
  if(!list.length){
    el.innerHTML = `
    <div class="info-box" style="margin-bottom:16px;">
      <b style="color:var(--text);">🎯 主力觀察（觀察期）</b><br>
      本分頁顯示「ATR(14)×2 動態停損」與「分點主力強度分數」。<br>
      <span style="color:var(--yellow)">⚠ 此日期尚無主力觀察資料 — 待 daily_scan 在啟用後重新跑一次才會出現。</span>
    </div>`;
    return;
  }

  const date = (data.meta && data.meta['掃描日期']) || '—';

  // 統計區
  const scored = list.filter(x=>x.mainForceScore!=null);
  const avgScore = scored.length ? Math.round(scored.reduce((a,b)=>a+b.mainForceScore,0)/scored.length*10)/10 : null;
  const strong = scored.filter(x=>x.mainForceScore>=70).length;
  const weak   = scored.filter(x=>x.mainForceScore<30).length;
  const netBuyTotal = list.reduce((a,b)=>a+(b.brokerNet||0),0);

  let html = `
  <div class="info-box" style="margin-bottom:14px;">
    <b style="color:var(--text);">🎯 主力觀察分頁說明</b><br>
    <b>主力分</b>：依分點 top15 計算 (40% 淨買超 + 35% 前 5 大集中度 + 25% 單一主力主導性) — ≥70 強力吸籌、≥55 偏多、≥45 中性、≥30 偏空、<30 大幅出脫<br>
    <b>停損價</b>：當日收盤 − 2 × ATR(14)，依個股波動動態調整<br>
    <b>主力淨</b>：分點 top15 買超合計減去 top15 賣超合計（張）— 來源：histock.tw
  </div>

  <div class="grid-4">
    <div class="card"><div class="card-title">掃描日期</div><div class="card-value" style="font-size:18px">${fmtDate(date)}</div></div>
    <div class="card"><div class="card-title">主力分平均</div>
      <div class="card-value" style="color:${mfScoreColor(avgScore)}">${avgScore!=null?avgScore.toFixed(1):'—'}</div>
      <div class="card-sub">${scored.length} 檔有資料</div></div>
    <div class="card"><div class="card-title">強力吸籌</div>
      <div class="card-value" style="color:var(--green)">${strong}</div>
      <div class="card-sub">主力分 ≥ 70</div></div>
    <div class="card"><div class="card-title">大幅出脫</div>
      <div class="card-value" style="color:var(--red)">${weak}</div>
      <div class="card-sub">主力分 < 30</div></div>
  </div>

  <div class="section-title">📊 主力強度排行（${list.length} 檔）</div>
  <div class="card" style="overflow-x:auto"><table>
    <tr>
      <th>代碼</th><th>名稱</th><th>族群</th><th>現價</th>
      <th>訊號</th><th>主力分</th><th>標籤</th>
      <th>Top1 買進</th><th>分點淨超</th><th>ATR</th><th>停損價</th><th></th>
    </tr>
    ${list.map((s,i)=>{
      const score = s.mainForceScore;
      const scoreCol = mfScoreColor(score);
      const netClass = (s.brokerNet||0)>=0?'chip-pos':'chip-neg';
      const top1 = s.top1Broker ? `${escHtml(s.top1Broker)} ${s.top1Lots? '+'+s.top1Lots+'張':''}` : '—';
      return `<tr>
        <td><b>${escHtml(s.id)}</b></td>
        <td>${escHtml(s.name)}</td>
        <td><span class="tag">${escHtml(s.sector||'')}</span></td>
        <td>${fmt(s.price,1)}</td>
        <td>${s.signal?badge(s.signal):'—'}</td>
        <td><b style="color:${scoreCol}">${score!=null?fmt(score,1):'—'}</b></td>
        <td style="font-size:12px;color:${scoreCol}">${escHtml(s.mainForceLabel||'—')}</td>
        <td style="font-size:12px">${top1}</td>
        <td class="${netClass}">${s.brokerNet!=null?sign(s.brokerNet)+(s.brokerNet).toLocaleString():'—'}</td>
        <td>${s.atr14!=null?fmt(s.atr14,2):'—'}</td>
        <td class="dn">${s.stopLoss!=null?fmt(s.stopLoss,1):'—'}</td>

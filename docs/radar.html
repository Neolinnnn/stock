<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>動能雷達</title>
<style>
  :root {
    --bg:#0b0e14; --card:#161a22; --border:#272c37;
    --text:#e8eaed; --sub:#8b93a3; --green:#2ecc71;
    --red:#e74c3c; --yellow:#f1b143; --blue:#4ea1f3;
    --accent:#3d8bfd; --accent2:#7c5cff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-size:14px;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Noto Sans TC','Microsoft JhengHei',sans-serif;
    -webkit-font-smoothing:antialiased;}
  header{background:rgba(17,21,29,.92);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50;
    border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  header h1{font-size:17px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  header a{color:var(--sub);text-decoration:none;font-size:13px;}
  header a:hover{color:var(--text);}
  main{padding:20px 24px;max-width:1100px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;}
  .card h2{font-size:13px;color:var(--sub);letter-spacing:.5px;margin-bottom:12px;}
  .meta-row{display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:var(--sub);}
  .meta-row b{color:var(--text);font-variant-numeric:tabular-nums;}
  table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;}
  td,th{padding:7px 8px;border-bottom:1px solid var(--border);text-align:right;font-size:13px;white-space:nowrap;}
  td:first-child,th:first-child,td.l,th.l{text-align:left;}
  th{color:var(--sub);font-weight:500;}
  tr:last-child td{border-bottom:none;}
  .pos{color:var(--green);} .neg{color:var(--red);}
  .pill{display:inline-block;background:#1e2330;border:1px solid var(--border);border-radius:20px;
    padding:2px 10px;font-size:12px;margin:0 4px 4px 0;color:var(--sub);}
  .warn{background:#1b2029;border-left:3px solid var(--yellow);padding:12px 14px;border-radius:0 8px 8px 0;line-height:1.7;}
  .hint{color:var(--sub);font-size:12px;margin-top:8px;line-height:1.6;}
  .streak{background:#2a1e1e;border:1px solid #4a2c2c;border-radius:20px;padding:1px 9px;font-size:12px;color:var(--red);}
  a.sid{color:var(--blue);text-decoration:none;}
  .tbl-wrap{overflow-x:auto;}
</style>
</head>
<body>
<header>
  <h1>🛰️ 動能雷達</h1>
  <a href="index.html">← 回主站</a>
</header>
<main id="main"><div class="card" id="loading">載入中…</div></main>

<script>
const fmtPct = v => v == null ? '—' : `<span class="${v >= 0 ? 'pos' : 'neg'}">${v > 0 ? '+' : ''}${v.toFixed(1)}%</span>`;
const fmtVal = v => v == null ? '—' : (v >= 100000 ? (v / 100000).toFixed(1) + ' 億' : Math.round(v / 100) / 10 + ' 千萬');
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const stockLink = (id, name) => `<a class="sid" href="index.html" title="至主站個股分析查詢">${esc(id)} ${esc(name)}</a>`;

async function load() {
  let d;
  try {
    d = await (await fetch('rotation_radar.json?ts=' + Date.now())).json();
  } catch (e) {
    document.getElementById('main').innerHTML = '<div class="card warn">尚無雷達資料（rotation_radar.json 不存在）。每日收集全市場行情、每週五產出報告。</div>';
    return;
  }

  let html = `
  <div class="card">
    <div class="meta-row">
      <span>產出時間 <b>${esc(d.generated_at)}</b></span>
      <span>資料區間 <b>${esc(d.data_start)} ~ ${esc(d.data_end)}</b>（${d.days_collected} 交易日）</span>
      ${d.window ? `<span>動能視窗 <b>${d.window} 日</b>${d.status === 'partial_window' ? '（資料未滿 21 日，暫用短視窗）' : ''}</span>` : ''}
      ${d.universe_size ? `<span>流動性池 <b>${d.universe_size}</b> 檔（20日均成交值 ≥ 1 億）</span>` : ''}
    </div>
  </div>`;

  if (d.status === 'warming_up') {
    html += `<div class="card warn">📡 資料暖機中：${esc(d.note)}。快取每日自動累積，約 4 週後有完整 20 日動能。</div>`;
    document.getElementById('main').innerHTML = html;
    return;
  }

  if (d.market) {
    html += `
    <div class="card">
      <h2>市場廣度</h2>
      <div class="meta-row">
        <span>上漲家數比 <b>${d.market.breadth_pos_ratio ?? '—'}%</b></span>
        <span>全市場動能中位數 ${fmtPct(d.market.median_ret)}</span>
      </div>
      <div class="hint">上漲家數比 &gt; 60% 偏多、&lt; 40% 偏空；搭配「多代理分析」的 regime 判讀使用。</div>
    </div>`;
  }

  const sec = d.sectors || [];
  html += `
  <div class="card">
    <h2>產業動能排行（官方產業別，${d.window} 日報酬中位數）</h2>
    <div class="tbl-wrap"><table>
      <tr><th class="l">產業</th><th>檔數</th><th>${d.window}日</th><th>60日</th><th>名單覆蓋</th><th class="l">領頭羊</th></tr>
      ${sec.slice(0, 15).map(s => `
        <tr>
          <td class="l">${esc(s.industry)}</td>
          <td>${s.n}</td>
          <td>${fmtPct(s.median_ret)}</td>
          <td>${fmtPct(s.median_ret60)}</td>
          <td>${s.watchlist_n > 0 ? s.watchlist_n + ' 檔' : '<span class="neg">未覆蓋</span>'}</td>
          <td class="l">${(s.leaders || []).map(l => `<span class="pill">${esc(l.id)} ${esc(l.name)} ${l.ret > 0 ? '+' : ''}${l.ret.toFixed(1)}%</span>`).join('')}</td>
        </tr>`).join('')}
    </table></div>
    <div class="hint">「名單覆蓋」= 該產業中已在 104 檔掃描名單內的檔數。動能靠前但未覆蓋的產業是擴充名單的訊號。</div>
  </div>`;

  const entry = d.entry_candidates || [];
  html += `
  <div class="card">
    <h2>進場候選（動能前 10%、不在掃描名單）</h2>
    ${entry.length === 0 ? '<div class="hint">本週無符合條件的名單外個股。</div>' : `
    <div class="tbl-wrap"><table>
      <tr><th class="l">個股</th><th class="l">產業</th><th>市場</th><th>${d.window}日</th><th>60日</th><th>日均成交</th><th>動能百分位</th></tr>
      ${entry.map(u => `
        <tr>
          <td class="l">${stockLink(u.id, u.name)}</td>
          <td class="l">${esc(u.industry)}</td>
          <td>${u.mkt === 'twse' ? '上市' : '上櫃'}</td>
          <td>${fmtPct(u.ret)}</td>
          <td>${fmtPct(u.ret60)}</td>
          <td>${fmtVal(u.avg_value)}</td>
          <td>${u.pct}</td>
        </tr>`).join('')}
    </table></div>`}
  </div>`;

  const exits = d.exit_candidates || [];
  html += `
  <div class="card">
    <h2>汰除候選（名單內動能後 30%）</h2>
    ${exits.length === 0 ? '<div class="hint">本週名單內個股動能皆在後 30% 之上。</div>' : `
    <div class="tbl-wrap"><table>
      <tr><th class="l">個股</th><th class="l">族群</th><th class="l">官方產業</th><th>${d.window}日</th><th>60日</th><th>動能百分位</th><th>連續弱勢</th></tr>
      ${exits.map(u => `
        <tr>
          <td class="l">${stockLink(u.id, u.name)}</td>
          <td class="l">${esc(u.sector)}</td>
          <td class="l">${esc(u.industry)}</td>
          <td>${fmtPct(u.ret)}</td>
          <td>${fmtPct(u.ret60)}</td>
          <td>${u.pct}</td>
          <td>${u.weeks_low >= 3 ? `<span class="streak">${u.weeks_low} 週</span>` : u.weeks_low + ' 週'}</td>
        </tr>`).join('')}
    </table></div>`}
    <div class="hint">連續弱勢 ≥ 3 週（紅框）建議優先檢視是否汰換。名單增刪仍由人工決定，本頁僅供參考。</div>
  </div>`;

  document.getElementById('main').innerHTML = html;
}
load();
</script>
</body>
</html>
